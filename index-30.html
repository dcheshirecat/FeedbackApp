<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Echo — Feedback Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;1,300;1,500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0f0e11;
    --surface: #1a1820;
    --surface2: #231f2e;
    --border: #2e2a3a;
    --accent: #c9a96e;
    --accent2: #7c6fcd;
    --accent3: #d4667a;
    --text: #f0eaf8;
    --text-dim: #9b94b0;
    --text-dimmer: #5a5470;
    --pill-bg: #2a2538;
    --success: #6ec9a0;
    --radius: 16px;
    --radius-sm: 10px;
    --font-body: 'Fraunces', Georgia, serif;
    --font-mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    overflow: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,111,205,0.13) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 90%, rgba(201,169,110,0.08) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── Header ── */
  .header {
    padding: 20px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(8px);
    background: rgba(15,14,17,0.7);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-title {
    font-size: 1.7rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1;
  }

  .header-title span {
    color: var(--accent);
    font-style: italic;
  }

  .header-sub {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text-dimmer);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .btn-add {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--bg);
    font-size: 1.4rem;
    font-weight: 300;
    transition: transform 0.15s, opacity 0.15s;
    flex-shrink: 0;
  }
  .btn-add:active { transform: scale(0.92); opacity: 0.85; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 12px 20px 0;
    background: var(--bg);
  }

  .tab {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 30px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text-dimmer);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab.active {
    background: var(--surface2);
    border-color: var(--border);
    color: var(--text);
  }

  /* ── Scroll area ── */
  .scroll-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px 100px;
    -webkit-overflow-scrolling: touch;
  }
  .scroll-area::-webkit-scrollbar { display: none; }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stat-pill {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    text-align: center;
  }
  .stat-num {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .stat-label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--text-dimmer);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-top: 3px;
  }

  /* ── Filter chips ── */
  .filter-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .chip {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.05em;
    padding: 5px 12px;
    border-radius: 30px;
    background: var(--pill-bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .chip.active, .chip:active {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(124,111,205,0.12);
  }

  /* ── Feedback card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s;
    cursor: pointer;
  }
  .card:active { transform: scale(0.985); }

  .card-accent-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }

  .card-content {
    font-size: 1rem;
    font-weight: 500;
    line-height: 1.4;
    color: var(--text);
    flex: 1;
    padding-left: 8px;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    align-items: center;
    padding-left: 8px;
  }

  .badge {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 30px;
    white-space: nowrap;
  }

  .badge-count {
    background: rgba(201,169,110,0.15);
    color: var(--accent);
    border: 1px solid rgba(201,169,110,0.3);
  }

  .badge-date {
    background: transparent;
    color: var(--text-dimmer);
    border: none;
    font-size: 0.58rem;
  }

  .badge-category {
    border: 1px solid var(--border);
  }

  .card-footer {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
    padding-left: 8px;
  }

  .recurrence-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent3);
    display: inline-block;
    margin-right: 2px;
    vertical-align: middle;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .recurrence-label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--accent3);
    letter-spacing: 0.05em;
  }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dimmer);
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.5; }
  .empty-text { font-size: 0.95rem; font-style: italic; line-height: 1.5; }

  /* ── Insights view ── */
  .insight-section { margin-bottom: 24px; }
  .insight-title {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text-dimmer);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .bar-label {
    font-size: 0.8rem;
    width: 120px;
    flex-shrink: 0;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .bar-track {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 10px;
    transition: width 0.6s cubic-bezier(0.16,1,0.3,1);
  }
  .bar-count {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text-dimmer);
    width: 20px;
    text-align: right;
    flex-shrink: 0;
  }

  .heatmap {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-top: 8px;
  }
  .heatmap-cell {
    aspect-ratio: 1;
    border-radius: 4px;
    background: var(--border);
    transition: background 0.3s;
  }

  /* ── Modal overlay ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    width: 100%;
    max-width: 480px;
    padding: 24px 20px 40px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-title {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 20px;
    font-style: italic;
    color: var(--accent);
  }

  label {
    display: block;
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dimmer);
    margin-bottom: 6px;
    margin-top: 16px;
  }
  label:first-of-type { margin-top: 0; }

  textarea, input[type=text], select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 1rem;
    padding: 12px 14px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }
  textarea:focus, input[type=text]:focus, select:focus {
    border-color: var(--accent2);
  }
  textarea { min-height: 80px; }

  .category-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 2px;
  }
  .cat-btn {
    padding: 10px 6px;
    border-radius: var(--radius-sm);
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 0.75rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    line-height: 1.3;
  }
  .cat-btn.selected {
    border-color: var(--accent2);
    background: rgba(124,111,205,0.15);
    color: var(--accent2);
  }
  .cat-icon { display: block; font-size: 1.2rem; margin-bottom: 3px; }

  .btn-primary {
    width: 100%;
    margin-top: 20px;
    padding: 15px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    color: var(--bg);
    font-family: var(--font-body);
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    letter-spacing: 0.01em;
  }
  .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

  .btn-danger {
    width: 100%;
    margin-top: 10px;
    padding: 13px;
    background: transparent;
    border: 1px solid rgba(212,102,122,0.4);
    border-radius: var(--radius-sm);
    color: var(--accent3);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-danger:active { background: rgba(212,102,122,0.1); }

  /* Detail view occurrences */
  .occurrence-list { margin-top: 8px; }
  .occ-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .occ-item:last-child { border-bottom: none; }
  .occ-date { color: var(--text-dim); font-style: italic; }
  .occ-note {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text-dimmer);
    max-width: 60%;
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Timeline dots */
  .timeline-label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--text-dimmer);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }
  .timeline-track {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
  }
  .tl-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent2);
    position: relative;
  }
  .tl-line {
    flex: 1;
    min-width: 10px;
    height: 1px;
    background: var(--border);
  }

  /* Notification badge */
  .nav-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent3);
    position: absolute;
    top: 2px; right: 2px;
  }

  .search-box {
    position: relative;
    margin-bottom: 12px;
  }
  .search-box input {
    padding-left: 36px;
    font-size: 0.9rem;
  }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dimmer);
    font-size: 0.9rem;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="app">

  <div class="header">
    <div>
      <div class="header-title"><span>echo</span></div>
      <div class="header-sub">Feedback memory</div>
    </div>
    <button class="btn-add" id="btnAdd" aria-label="Add feedback">+</button>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="feed">Feed</button>
    <button class="tab" data-tab="insights">Insights</button>
    <button class="tab" data-tab="search">Search</button>
  </div>

  <div class="scroll-area" id="scrollArea"></div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">New Feedback</div>

    <label>What did he say?</label>
    <textarea id="feedbackText" placeholder="Write the feedback as you remember it…"></textarea>

    <label>Category</label>
    <div class="category-grid" id="categoryGrid"></div>

    <label>Context / note (optional)</label>
    <input type="text" id="contextNote" placeholder="e.g. after dinner, about the report…"/>

    <button class="btn-primary" id="btnSave">Save Feedback</button>
    <button class="btn-danger" id="btnDelete" style="display:none">Delete this entry</button>
    <button class="btn-danger" style="margin-top:8px;border-color:var(--border);color:var(--text-dimmer)" id="btnCancel">Cancel</button>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" id="detailContent"></div>
</div>

<script>
const CATEGORIES = [
  { id:'communication', label:'Communication', icon:'💬', color:'#7c6fcd' },
  { id:'household',     label:'Household',     icon:'🏠', color:'#6ec9a0' },
  { id:'emotional',     label:'Emotional',     icon:'💛', color:'#c9a96e' },
  { id:'work',          label:'Work / Career',  icon:'💼', color:'#9b8fcc' },
  { id:'health',        label:'Health',         icon:'🌿', color:'#6ec9b8' },
  { id:'personal',      label:'Personal',       icon:'🪞', color:'#d4667a' },
  { id:'relationship',  label:'Relationship',   icon:'🔗', color:'#c9826e' },
  { id:'habits',        label:'Habits',         icon:'🔄', color:'#7cb4c9' },
  { id:'other',         label:'Other',          icon:'✦',  color:'#9494a8' },
];

let data = JSON.parse(localStorage.getItem('echo_data') || '[]');
let currentTab = 'feed';
let filterCat = 'all';
let editingId = null;
let selectedCat = null;
let searchQ = '';

function save() {
  localStorage.setItem('echo_data', JSON.stringify(data));
}

function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function fmtDateShort(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function getCat(id) {
  return CATEGORIES.find(c=>c.id===id) || CATEGORIES[8];
}

// Similarity: check if two feedbacks are about the same topic (simple word overlap)
function getSimilarIds(item) {
  const words = item.text.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/).filter(w=>w.length>3);
  return data.filter(d => d.id !== item.id && d.category === item.category).filter(d => {
    const dw = d.text.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/);
    return words.some(w => dw.includes(w));
  }).map(d=>d.id);
}

function render() {
  const area = document.getElementById('scrollArea');
  if (currentTab === 'feed') renderFeed(area);
  else if (currentTab === 'insights') renderInsights(area);
  else renderSearch(area);
}

function renderFeed(area) {
  const cats = [...new Set(data.map(d=>d.category))];
  let items = filterCat === 'all' ? data : data.filter(d=>d.category===filterCat);
  items = [...items].sort((a,b)=>b.occurrences[b.occurrences.length-1].ts - a.occurrences[a.occurrences.length-1].ts);

  let html = '';

  // Stats bar
  const total = data.length;
  const recurring = data.filter(d=>d.occurrences.length>1).length;
  const thisMonth = data.filter(d=>{
    const last = d.occurrences[d.occurrences.length-1].ts;
    const now = new Date(); const m = new Date(last);
    return m.getMonth()===now.getMonth()&&m.getFullYear()===now.getFullYear();
  }).length;

  html += `<div class="stats-bar">
    <div class="stat-pill"><div class="stat-num">${total}</div><div class="stat-label">Total</div></div>
    <div class="stat-pill"><div class="stat-num">${recurring}</div><div class="stat-label">Recurring</div></div>
    <div class="stat-pill"><div class="stat-num">${thisMonth}</div><div class="stat-label">This month</div></div>
  </div>`;

  // Filter chips
  html += `<div class="filter-row">
    <div class="chip ${filterCat==='all'?'active':''}" data-filter="all">All</div>`;
  cats.forEach(c=>{
    const cat = getCat(c);
    html += `<div class="chip ${filterCat===c?'active':''}" data-filter="${c}">${cat.icon} ${cat.label}</div>`;
  });
  html += `</div>`;

  if (items.length === 0) {
    html += `<div class="empty"><div class="empty-icon">🌱</div><div class="empty-text">Nothing here yet.<br/>Tap + to log your first feedback.</div></div>`;
  } else {
    items.forEach(item => {
      const cat = getCat(item.category);
      const count = item.occurrences.length;
      const lastTs = item.occurrences[item.occurrences.length-1].ts;
      const isRecurring = count > 1;
      html += `<div class="card" data-id="${item.id}">
        <div class="card-accent-bar" style="background:${cat.color}"></div>
        <div class="card-header">
          <div class="card-content">${escHtml(item.text)}</div>
        </div>
        <div class="card-meta">
          <span class="badge badge-category" style="color:${cat.color};border-color:${cat.color}33;background:${cat.color}18">${cat.icon} ${cat.label}</span>
          ${count>1?`<span class="badge badge-count">×${count}</span>`:''}
          <span class="badge badge-date">${fmtDate(lastTs)}</span>
        </div>
        ${isRecurring?`<div class="card-footer"><span class="recurrence-dot"></span><span class="recurrence-label">Recurring · first on ${fmtDateShort(item.occurrences[0].ts)}</span></div>`:''}
      </div>`;
    });
  }

  area.innerHTML = html;

  area.querySelectorAll('[data-filter]').forEach(el=>{
    el.addEventListener('click',()=>{ filterCat=el.dataset.filter; render(); });
  });
  area.querySelectorAll('.card').forEach(el=>{
    el.addEventListener('click',()=>{ openDetail(el.dataset.id); });
  });
}

function renderInsights(area) {
  if (data.length === 0) {
    area.innerHTML = `<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Add some feedback first<br/>to see insights.</div></div>`;
    return;
  }

  // Category breakdown
  const catCounts = {};
  data.forEach(d=>{ catCounts[d.category]=(catCounts[d.category]||0)+d.occurrences.length; });
  const maxCat = Math.max(...Object.values(catCounts));
  const sortedCats = Object.entries(catCounts).sort((a,b)=>b[1]-a[1]);

  // Top recurring
  const recurring = [...data].filter(d=>d.occurrences.length>1).sort((a,b)=>b.occurrences.length-a.occurrences.length).slice(0,5);

  // Monthly trend (last 6 months)
  const now = new Date();
  const months = [];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    months.push({label:d.toLocaleDateString('en-US',{month:'short'}),count:0,key:`${d.getFullYear()}-${d.getMonth()}`});
  }
  data.forEach(item=>{
    item.occurrences.forEach(occ=>{
      const d=new Date(occ.ts);
      const key=`${d.getFullYear()}-${d.getMonth()}`;
      const m=months.find(m=>m.key===key);
      if(m) m.count++;
    });
  });
  const maxMonth=Math.max(...months.map(m=>m.count),1);

  let html = `<div class="insight-section">
    <div class="insight-title">By Category</div>`;
  sortedCats.forEach(([cid,count])=>{
    const cat=getCat(cid);
    html+=`<div class="bar-row">
      <div class="bar-label">${cat.icon} ${cat.label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/maxCat*100)}%;background:linear-gradient(90deg,${cat.color}88,${cat.color})"></div></div>
      <div class="bar-count">${count}</div>
    </div>`;
  });
  html+=`</div>`;

  html+=`<div class="insight-section">
    <div class="insight-title">Monthly Activity</div>
    <div class="bar-row" style="gap:6px;align-items:flex-end;height:60px">`;
  months.forEach(m=>{
    const h=m.count?Math.max(8,Math.round(m.count/maxMonth*50)):4;
    html+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="width:100%;height:${h}px;background:${m.count?'linear-gradient(180deg,var(--accent2),var(--accent))':'var(--border)'};border-radius:4px 4px 0 0"></div>
      <div style="font-family:var(--font-mono);font-size:0.55rem;color:var(--text-dimmer)">${m.label}</div>
    </div>`;
  });
  html+=`</div></div>`;

  if (recurring.length) {
    html+=`<div class="insight-section">
      <div class="insight-title">Most Recurring</div>`;
    recurring.forEach(item=>{
      const cat=getCat(item.category);
      html+=`<div class="card" data-id="${item.id}" style="margin-bottom:10px">
        <div class="card-accent-bar" style="background:${cat.color}"></div>
        <div class="card-content" style="padding-left:12px;font-size:0.9rem">${escHtml(item.text.slice(0,80))}${item.text.length>80?'…':''}</div>
        <div class="card-meta" style="padding-left:12px;margin-top:6px">
          <span class="badge badge-count">×${item.occurrences.length}</span>
          <span class="badge badge-date">${fmtDate(item.occurrences[0].ts)} → ${fmtDate(item.occurrences[item.occurrences.length-1].ts)}</span>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  area.innerHTML=html;
  area.querySelectorAll('.card[data-id]').forEach(el=>{
    el.addEventListener('click',()=>{ openDetail(el.dataset.id); });
  });
}

function renderSearch(area) {
  let html=`<div class="search-box"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="Search feedback…" value="${escHtml(searchQ)}"/></div>`;

  const q=searchQ.toLowerCase().trim();
  const results=q?data.filter(d=>
    d.text.toLowerCase().includes(q)||
    (d.occurrences.some(o=>o.note&&o.note.toLowerCase().includes(q)))||
    getCat(d.category).label.toLowerCase().includes(q)
  ):data;

  const sorted=[...results].sort((a,b)=>b.occurrences[b.occurrences.length-1].ts-a.occurrences[a.occurrences.length-1].ts);

  if(sorted.length===0){
    html+=`<div class="empty"><div class="empty-icon">🔎</div><div class="empty-text">${q?'No results found.':'Start typing to search.'}</div></div>`;
  } else {
    sorted.forEach(item=>{
      const cat=getCat(item.category);
      const count=item.occurrences.length;
      html+=`<div class="card" data-id="${item.id}">
        <div class="card-accent-bar" style="background:${cat.color}"></div>
        <div class="card-content" style="padding-left:10px">${escHtml(item.text)}</div>
        <div class="card-meta" style="margin-top:8px;padding-left:10px">
          <span class="badge badge-category" style="color:${cat.color};border-color:${cat.color}33;background:${cat.color}18">${cat.icon} ${cat.label}</span>
          ${count>1?`<span class="badge badge-count">×${count}</span>`:''}
        </div>
      </div>`;
    });
  }

  area.innerHTML=html;
  const si=area.querySelector('#searchInput');
  if(si){ si.addEventListener('input',e=>{ searchQ=e.target.value; renderSearch(area); }); si.focus(); }
  area.querySelectorAll('.card[data-id]').forEach(el=>{
    el.addEventListener('click',()=>{ openDetail(el.dataset.id); });
  });
}

function openDetail(id) {
  const item=data.find(d=>d.id===id);
  if(!item) return;
  const cat=getCat(item.category);
  const similar=getSimilarIds(item);

  let occ='';
  [...item.occurrences].reverse().forEach((o,i)=>{
    occ+=`<div class="occ-item"><span class="occ-date">${fmtDate(o.ts)}</span><span class="occ-note">${escHtml(o.note||'—')}</span></div>`;
  });

  let tlHtml='';
  item.occurrences.forEach((o,i)=>{
    tlHtml+=`<div class="tl-dot" title="${fmtDate(o.ts)}" style="background:${cat.color}"></div>`;
    if(i<item.occurrences.length-1) tlHtml+=`<div class="tl-line"></div>`;
  });

  const content=document.getElementById('detailContent');
  content.innerHTML=`
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">
      <div>
        <div style="font-family:var(--font-mono);font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;color:${cat.color};margin-bottom:6px">${cat.icon} ${cat.label}</div>
        <div style="font-size:1.1rem;font-weight:500;line-height:1.4;color:var(--text);max-width:280px">${escHtml(item.text)}</div>
      </div>
      <div style="text-align:center;background:rgba(201,169,110,0.12);border:1px solid rgba(201,169,110,0.25);border-radius:10px;padding:8px 14px;flex-shrink:0">
        <div style="font-size:1.8rem;font-weight:700;color:var(--accent);line-height:1">${item.occurrences.length}</div>
        <div style="font-family:var(--font-mono);font-size:0.55rem;color:var(--text-dimmer);text-transform:uppercase;letter-spacing:0.06em">times</div>
      </div>
    </div>

    ${item.occurrences.length>1?`
    <div style="margin-bottom:16px">
      <div class="timeline-label">Timeline</div>
      <div class="timeline-track">${tlHtml}</div>
      <div style="font-family:var(--font-mono);font-size:0.58rem;color:var(--text-dimmer);margin-top:6px">
        First: ${fmtDate(item.occurrences[0].ts)} · Last: ${fmtDate(item.occurrences[item.occurrences.length-1].ts)}
      </div>
    </div>`:''}

    <div style="font-family:var(--font-mono);font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dimmer);margin-bottom:8px">All occurrences</div>
    <div class="occurrence-list">${occ}</div>

    ${similar.length?`<div style="margin-top:16px;font-family:var(--font-mono);font-size:0.6rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent3);margin-bottom:8px">⟳ Similar feedback detected</div>`:''}

    <button class="btn-primary" id="btnLogAgain" style="margin-top:20px">Log it happened again</button>
    <button class="btn-primary" id="btnEdit" style="background:var(--surface2);color:var(--text);margin-top:10px">Edit</button>
    <button class="btn-danger" id="btnDetailClose" style="margin-top:8px;border-color:var(--border);color:var(--text-dimmer)">Close</button>
  `;

  document.getElementById('detailModal').classList.add('open');

  content.querySelector('#btnLogAgain').addEventListener('click',()=>{
    const note=prompt('Any context for this occurrence? (optional)','');
    item.occurrences.push({ts:Date.now(),note:note||''});
    save(); closeDetail(); render();
  });
  content.querySelector('#btnEdit').addEventListener('click',()=>{ closeDetail(); openEdit(id); });
  content.querySelector('#btnDetailClose').addEventListener('click',closeDetail);
  document.getElementById('detailModal').addEventListener('click',e=>{ if(e.target===document.getElementById('detailModal')) closeDetail(); },{once:true});
}

function closeDetail() {
  document.getElementById('detailModal').classList.remove('open');
}

function openAdd() {
  editingId=null;
  selectedCat=null;
  document.getElementById('feedbackText').value='';
  document.getElementById('contextNote').value='';
  document.getElementById('modalTitle').textContent='New Feedback';
  document.getElementById('btnDelete').style.display='none';
  buildCategoryGrid();
  document.getElementById('addModal').classList.add('open');
  setTimeout(()=>document.getElementById('feedbackText').focus(),350);
}

function openEdit(id) {
  const item=data.find(d=>d.id===id);
  if(!item) return;
  editingId=id;
  selectedCat=item.category;
  document.getElementById('feedbackText').value=item.text;
  document.getElementById('contextNote').value=item.occurrences[0].note||'';
  document.getElementById('modalTitle').textContent='Edit Feedback';
  document.getElementById('btnDelete').style.display='block';
  buildCategoryGrid();
  document.getElementById('addModal').classList.add('open');
}

function buildCategoryGrid() {
  const grid=document.getElementById('categoryGrid');
  grid.innerHTML=CATEGORIES.map(c=>`
    <div class="cat-btn ${selectedCat===c.id?'selected':''}" data-cat="${c.id}">
      <span class="cat-icon">${c.icon}</span>${c.label}
    </div>`).join('');
  grid.querySelectorAll('.cat-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      selectedCat=btn.dataset.cat;
      grid.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });
}

function closeAdd() {
  document.getElementById('addModal').classList.remove('open');
}

document.getElementById('btnAdd').addEventListener('click',openAdd);
document.getElementById('btnCancel').addEventListener('click',closeAdd);
document.getElementById('addModal').addEventListener('click',e=>{ if(e.target===document.getElementById('addModal')) closeAdd(); });

document.getElementById('btnSave').addEventListener('click',()=>{
  const text=document.getElementById('feedbackText').value.trim();
  const note=document.getElementById('contextNote').value.trim();
  if(!text){ document.getElementById('feedbackText').focus(); return; }
  if(!selectedCat){ alert('Please select a category.'); return; }

  if(editingId) {
    const item=data.find(d=>d.id===editingId);
    item.text=text;
    item.category=selectedCat;
    if(item.occurrences[0]) item.occurrences[0].note=note;
  } else {
    data.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2), text, category:selectedCat, occurrences:[{ts:Date.now(),note}] });
  }
  save(); closeAdd(); render();
});

document.getElementById('btnDelete').addEventListener('click',()=>{
  if(confirm('Delete this feedback?')) {
    data=data.filter(d=>d.id!==editingId);
    save(); closeAdd(); render();
  }
});

// Tabs
document.getElementById('tabs').querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentTab=tab.dataset.tab;
    render();
  });
});

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

render();
</script>
</body>
</html>
