name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node + Java ─────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # ── 3. Install Capacitor CLI + Android platform ────────────────────────
      - name: Install dependencies
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android

      # ── 4. Write capacitor.config.json ─────────────────────────────────────
      - name: Write Capacitor config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.echo.feedbacktracker",
            "appName": "Echo",
            "webDir": "www"
          }
          EOF

      # ── 5. Copy index.html into www/ ───────────────────────────────────────
      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html www/index.html

      # ── 6. Add Android platform ────────────────────────────────────────────
      - name: Add Android platform
        run: npx cap add android

      # ── 7. Sync web assets into Android project ────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 8. Generate a one-time keystore ────────────────────────────────────
      - name: Generate keystore
        run: |
          KEYSTORE_PASS="echo-$(echo $GITHUB_RUN_ID | sha256sum | head -c 24)"
          echo "KEYSTORE_PASS=$KEYSTORE_PASS" >> $GITHUB_ENV
          keytool -genkeypair \
            -keystore android/app/release.keystore \
            -alias echo \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "$KEYSTORE_PASS" \
            -keypass  "$KEYSTORE_PASS" \
            -dname "CN=Echo App, OU=Dev, O=Echo, L=City, S=State, C=US" \
            -noprompt

      # ── 9. Inject signing config with Python (no fragile sed) ──────────────
      - name: Inject signing config into build.gradle
        env:
          KEYSTORE_PASS: ${{ env.KEYSTORE_PASS }}
        run: |
          python3 - << 'PYEOF'
          import os, re

          gradle_path = "android/app/build.gradle"
          kp = os.environ["KEYSTORE_PASS"]

          signing_block = (
              "\n    signingConfigs {\n"
              "        release {\n"
              "            storeFile file(\"release.keystore\")\n"
              f"            storePassword \"{kp}\"\n"
              "            keyAlias \"echo\"\n"
              f"            keyPassword \"{kp}\"\n"
              "        }\n"
              "    }\n"
          )

          release_type = (
              "\n        release {\n"
              "            signingConfig signingConfigs.release\n"
              "            minifyEnabled false\n"
              "            shrinkResources false\n"
              "        }\n"
          )

          with open(gradle_path) as f:
              src = f.read()

          src = re.sub(r'(android\s*\{)', r'\1' + signing_block, src, count=1)
          src = re.sub(r'(buildTypes\s*\{)', r'\1' + release_type, src, count=1)

          with open(gradle_path, "w") as f:
              f.write(src)

          print("Patched build.gradle OK")
          PYEOF

      # ── 10. Make Gradle wrapper executable ─────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── 11. Build signed release APK ───────────────────────────────────────
      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── 12. Rename APK with run number ─────────────────────────────────────
      - name: Rename APK
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/app-release.apk \
             dist/echo-v${{ github.run_number }}.apk

      # ── 13. Upload APK as workflow artifact ────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: echo-apk-${{ github.run_number }}
          path: dist/echo-v${{ github.run_number }}.apk
          retention-days: 30
