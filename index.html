<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Echo — Feedback Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;1,300;1,500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #fff8f0;
  --surface: #ffffff;
  --surface2: #fff0f5;
  --border: #f0d6e8;
  --accent:  #ff5fa0;
  --accent2: #7c5cfc;
  --accent3: #ff9f43;
  --accent4: #00cec9;
  --green:   #00b894;
  --red:     #ff5252;
  --yellow:  #ffd32a;
  --text:    #2d2040;
  --text-dim: #7a6a8a;
  --text-dimmer: #b8a8c8;
  --pill-bg: #f5eeff;
  --radius: 18px;
  --radius-sm: 12px;
  --font-body: 'Fraunces', Georgia, serif;
  --font-mono: 'DM Mono', monospace;
  --shadow: 0 4px 24px rgba(124,92,252,0.10);
  --shadow-sm: 0 2px 10px rgba(124,92,252,0.07);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 40% at 10% 0%, rgba(255,95,160,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 100%, rgba(124,92,252,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(255,159,67,0.06) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}

#app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  height: 100%; max-width: 480px; margin: 0 auto;
}

/* ── Header ── */
.header {
  padding: 18px 20px 14px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(255,248,240,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 2px solid var(--border);
  position: sticky; top: 0; z-index: 10;
}
.header-logo {
  display: flex; align-items: center; gap: 10px;
}
.header-dot {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; box-shadow: 0 3px 12px rgba(255,95,160,0.4);
}
.header-title {
  font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em;
  color: var(--text); line-height: 1;
}
.header-title span { color: var(--accent); font-style: italic; }
.header-sub {
  font-family: var(--font-mono); font-size: 0.6rem;
  color: var(--text-dimmer); letter-spacing: 0.08em;
  text-transform: uppercase; margin-top: 1px;
}
.btn-add {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 1.5rem; font-weight: 300;
  box-shadow: 0 4px 16px rgba(255,95,160,0.45);
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn-add:active { transform: scale(0.90); box-shadow: none; }

/* ── Tabs ── */
.tabs {
  display: flex; gap: 4px; padding: 12px 16px 0;
  background: var(--bg); overflow-x: auto;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  font-family: var(--font-mono); font-size: 0.68rem;
  letter-spacing: 0.05em; text-transform: uppercase;
  padding: 8px 16px; border-radius: 30px;
  border: 2px solid transparent;
  background: transparent; color: var(--text-dimmer);
  cursor: pointer; transition: all 0.2s; white-space: nowrap; flex-shrink: 0;
}
.tab.active {
  background: var(--surface); border-color: var(--accent);
  color: var(--accent); box-shadow: var(--shadow-sm);
}

/* ── Scroll area ── */
.scroll-area {
  flex: 1; overflow-y: auto;
  padding: 16px 16px 100px;
  -webkit-overflow-scrolling: touch;
}
.scroll-area::-webkit-scrollbar { display: none; }

/* ── Stats bar ── */
.stats-bar { display: flex; gap: 10px; margin-bottom: 16px; }
.stat-pill {
  flex: 1;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 10px; text-align: center;
  box-shadow: var(--shadow-sm);
}
.stat-num {
  font-size: 1.6rem; font-weight: 700; line-height: 1;
}
.stat-num.pink  { color: var(--accent); }
.stat-num.purple { color: var(--accent2); }
.stat-num.orange { color: var(--accent3); }
.stat-label {
  font-family: var(--font-mono); font-size: 0.58rem;
  color: var(--text-dimmer); text-transform: uppercase;
  letter-spacing: 0.07em; margin-top: 3px;
}

/* ── Filter chips ── */
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.chip {
  font-family: var(--font-mono); font-size: 0.63rem;
  letter-spacing: 0.04em; padding: 6px 13px;
  border-radius: 30px; background: var(--surface);
  border: 2px solid var(--border); color: var(--text-dim);
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
  box-shadow: var(--shadow-sm);
}
.chip.active {
  border-color: var(--accent2); color: var(--accent2);
  background: rgba(124,92,252,0.08);
}

/* ── Feedback card ── */
.card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 16px 14px;
  margin-bottom: 12px;
  position: relative; overflow: hidden;
  transition: transform 0.15s, box-shadow 0.15s;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
}
.card:active { transform: scale(0.982); box-shadow: none; }

.card-accent-bar {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px; border-radius: 4px 0 0 4px;
}
.card-content {
  font-size: 1rem; font-weight: 500; line-height: 1.45;
  color: var(--text); flex: 1; padding-left: 10px;
}
.card-meta {
  display: flex; flex-wrap: wrap; gap: 6px;
  align-items: center; padding-left: 10px; margin-top: 8px;
}
.badge {
  font-family: var(--font-mono); font-size: 0.6rem;
  letter-spacing: 0.05em; text-transform: uppercase;
  padding: 3px 10px; border-radius: 30px; white-space: nowrap;
}
.badge-count {
  background: rgba(255,95,160,0.12); color: var(--accent);
  border: 1.5px solid rgba(255,95,160,0.3);
}
.badge-date { color: var(--text-dimmer); font-size: 0.57rem; }
.badge-category { border: 1.5px solid; }
.card-footer {
  margin-top: 10px; padding-top: 8px;
  border-top: 1.5px dashed var(--border);
  display: flex; gap: 6px; flex-wrap: wrap;
  align-items: center; padding-left: 10px;
}
.recurrence-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent); display: inline-block;
  margin-right: 3px; vertical-align: middle;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.5;transform:scale(0.8)}
}
.recurrence-label {
  font-family: var(--font-mono); font-size: 0.6rem;
  color: var(--accent); letter-spacing: 0.04em;
}

/* ── Task cards ── */
.task-card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  position: relative; overflow: hidden;
  cursor: pointer;
  box-shadow: var(--shadow-sm);
  transition: transform 0.15s;
}
.task-card:active { transform: scale(0.982); }
.task-card.done { opacity: 0.55; }
.task-card.done .task-title { text-decoration: line-through; color: var(--text-dimmer); }

.urgency-bar {
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 5px; border-radius: 5px 0 0 5px;
}
.task-title {
  font-size: 0.95rem; font-weight: 600;
  color: var(--text); padding-left: 10px;
  line-height: 1.35; margin-bottom: 8px;
}
.task-meta {
  display: flex; gap: 8px; align-items: center;
  flex-wrap: wrap; padding-left: 10px;
}
.urgency-badge {
  font-family: var(--font-mono); font-size: 0.6rem;
  letter-spacing: 0.05em; text-transform: uppercase;
  padding: 3px 10px; border-radius: 30px;
  font-weight: 500;
}
.urgency-critical { background: rgba(255,82,82,0.15); color: var(--red); border: 1.5px solid rgba(255,82,82,0.3); }
.urgency-high     { background: rgba(255,159,67,0.15); color: var(--accent3); border: 1.5px solid rgba(255,159,67,0.3); }
.urgency-medium   { background: rgba(124,92,252,0.12); color: var(--accent2); border: 1.5px solid rgba(124,92,252,0.25); }
.urgency-low      { background: rgba(0,184,148,0.12); color: var(--green); border: 1.5px solid rgba(0,184,148,0.25); }

.due-badge {
  font-family: var(--font-mono); font-size: 0.6rem;
  color: var(--text-dim); display: flex; align-items: center; gap: 4px;
}
.due-badge.overdue { color: var(--red); font-weight: 600; }
.due-badge.soon    { color: var(--accent3); font-weight: 600; }

.task-check {
  position: absolute; right: 14px; top: 50%;
  transform: translateY(-50%);
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.9rem; cursor: pointer;
  transition: all 0.2s;
}
.task-check.checked {
  background: var(--green); border-color: var(--green);
  color: white;
}

.task-notif-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent2); display: inline-block;
  margin-left: 4px; vertical-align: middle;
}

/* ── Empty state ── */
.empty { text-align: center; padding: 60px 20px; color: var(--text-dimmer); }
.empty-icon { font-size: 3rem; margin-bottom: 14px; }
.empty-text { font-size: 0.95rem; font-style: italic; line-height: 1.6; }

/* ── Insights ── */
.insight-section { margin-bottom: 24px; }
.insight-title {
  font-family: var(--font-mono); font-size: 0.65rem;
  color: var(--text-dimmer); text-transform: uppercase;
  letter-spacing: 0.1em; margin-bottom: 12px;
  padding-bottom: 8px; border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: 6px;
}
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
.bar-label { font-size: 0.8rem; width: 120px; flex-shrink: 0; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 10px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 10px; transition: width 0.7s cubic-bezier(0.16,1,0.3,1); }
.bar-count { font-family: var(--font-mono); font-size: 0.65rem; color: var(--text-dimmer); width: 22px; text-align: right; flex-shrink: 0; }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(45,32,64,0.55);
  z-index: 100; display: flex;
  align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
  backdrop-filter: blur(6px);
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius) var(--radius) 0 0;
  width: 100%; max-width: 480px;
  padding: 24px 20px 44px;
  transform: translateY(100%);
  transition: transform 0.32s cubic-bezier(0.16,1,0.3,1);
  max-height: 92vh; overflow-y: auto;
  box-shadow: 0 -8px 40px rgba(124,92,252,0.15);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle {
  width: 40px; height: 4px;
  background: var(--border); border-radius: 2px;
  margin: 0 auto 22px;
}
.modal-title {
  font-size: 1.35rem; font-weight: 700; margin-bottom: 20px;
  font-style: italic;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

label {
  display: block; font-family: var(--font-mono);
  font-size: 0.65rem; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-dimmer);
  margin-bottom: 7px; margin-top: 18px;
}
label:first-of-type { margin-top: 0; }

textarea, input[type=text], input[type=date], select {
  width: 100%;
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text); font-family: var(--font-body);
  font-size: 1rem; padding: 12px 14px;
  resize: none; outline: none;
  transition: border-color 0.2s;
  appearance: none; -webkit-appearance: none;
}
textarea:focus, input:focus, select:focus {
  border-color: var(--accent2);
}
textarea { min-height: 80px; }

.category-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 4px; }
.cat-btn {
  padding: 11px 6px; border-radius: var(--radius-sm);
  background: var(--bg); border: 2px solid var(--border);
  color: var(--text-dim); font-size: 0.75rem;
  text-align: center; cursor: pointer; transition: all 0.2s; line-height: 1.3;
}
.cat-btn.selected {
  border-color: var(--accent2);
  background: rgba(124,92,252,0.08); color: var(--accent2);
}
.cat-icon { display: block; font-size: 1.3rem; margin-bottom: 3px; }

/* Urgency selector */
.urgency-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-top: 4px; }
.urg-btn {
  padding: 12px 8px; border-radius: var(--radius-sm);
  background: var(--bg); border: 2px solid var(--border);
  color: var(--text-dim); font-family: var(--font-mono);
  font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em;
  text-align: center; cursor: pointer; transition: all 0.2s;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.urg-btn.selected-critical { border-color: var(--red); background: rgba(255,82,82,0.1); color: var(--red); }
.urg-btn.selected-high     { border-color: var(--accent3); background: rgba(255,159,67,0.1); color: var(--accent3); }
.urg-btn.selected-medium   { border-color: var(--accent2); background: rgba(124,92,252,0.08); color: var(--accent2); }
.urg-btn.selected-low      { border-color: var(--green); background: rgba(0,184,148,0.08); color: var(--green); }

/* Notification toggle */
.notif-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg); border: 2px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px 14px;
  margin-top: 4px;
}
.notif-label { font-size: 0.9rem; color: var(--text-dim); }
.toggle {
  width: 44px; height: 26px; border-radius: 13px;
  background: var(--border); position: relative;
  cursor: pointer; transition: background 0.2s; flex-shrink: 0;
}
.toggle.on { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
.toggle::after {
  content: ''; position: absolute;
  width: 20px; height: 20px; border-radius: 50%;
  background: white; top: 3px; left: 3px;
  transition: transform 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.toggle.on::after { transform: translateX(18px); }

.btn-primary {
  width: 100%; margin-top: 20px; padding: 16px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: var(--radius-sm);
  color: white; font-family: var(--font-body);
  font-size: 1rem; font-weight: 700; cursor: pointer;
  transition: opacity 0.2s, transform 0.15s;
  box-shadow: 0 4px 16px rgba(255,95,160,0.35);
}
.btn-primary:active { transform: scale(0.98); opacity: 0.9; }
.btn-secondary {
  width: 100%; margin-top: 10px; padding: 14px;
  background: var(--bg); border: 2px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-dim);
  font-family: var(--font-mono); font-size: 0.72rem;
  text-transform: uppercase; letter-spacing: 0.05em;
  cursor: pointer; transition: all 0.2s;
}
.btn-secondary:active { background: var(--border); }
.btn-danger {
  width: 100%; margin-top: 10px; padding: 13px;
  background: transparent; border: 2px solid rgba(255,82,82,0.3);
  border-radius: var(--radius-sm); color: var(--red);
  font-family: var(--font-mono); font-size: 0.72rem;
  text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer;
  transition: all 0.2s;
}
.btn-danger:active { background: rgba(255,82,82,0.08); }

/* Occurrence list */
.occ-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 0; border-bottom: 1.5px solid var(--border);
  font-size: 0.88rem;
}
.occ-item:last-child { border-bottom: none; }
.occ-date { color: var(--text-dim); font-style: italic; }
.occ-note {
  font-family: var(--font-mono); font-size: 0.62rem;
  color: var(--text-dimmer); max-width: 55%;
  text-align: right; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}

/* Timeline */
.timeline-label {
  font-family: var(--font-mono); font-size: 0.6rem;
  color: var(--text-dimmer); text-transform: uppercase;
  letter-spacing: 0.08em; margin-bottom: 8px;
}
.timeline-track { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
.tl-dot {
  width: 11px; height: 11px; border-radius: 50%;
  border: 2px solid white; box-shadow: 0 0 0 2px currentColor;
}
.tl-line { flex: 1; min-width: 8px; height: 2px; background: var(--border); }

/* Task urgency section header */
.section-header {
  font-family: var(--font-mono); font-size: 0.65rem;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--text-dimmer); margin: 16px 0 8px;
  display: flex; align-items: center; gap: 8px;
}
.section-header::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* Notification permission banner */
.notif-banner {
  background: linear-gradient(135deg, rgba(124,92,252,0.12), rgba(255,95,160,0.08));
  border: 2px solid rgba(124,92,252,0.2);
  border-radius: var(--radius-sm); padding: 12px 14px;
  margin-bottom: 14px; display: flex;
  align-items: center; justify-content: space-between; gap: 10px;
}
.notif-banner-text {
  font-size: 0.85rem; color: var(--text-dim); line-height: 1.4; flex: 1;
}
.notif-banner-btn {
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  color: white; border: none; border-radius: 8px;
  padding: 7px 14px; font-family: var(--font-mono);
  font-size: 0.62rem; text-transform: uppercase;
  letter-spacing: 0.05em; cursor: pointer; white-space: nowrap;
}

/* Search */
.search-box { position: relative; margin-bottom: 12px; }
.search-box input { padding-left: 38px; font-size: 0.92rem; }
.search-icon {
  position: absolute; left: 13px; top: 50%;
  transform: translateY(-50%); color: var(--text-dimmer);
  font-size: 0.9rem; pointer-events: none;
}

/* Linked feedback chip on task */
.linked-chip {
  font-family: var(--font-mono); font-size: 0.58rem;
  background: rgba(124,92,252,0.08); color: var(--accent2);
  border: 1.5px solid rgba(124,92,252,0.2);
  border-radius: 20px; padding: 2px 8px;
  max-width: 160px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-logo">
      <div class="header-dot">🌀</div>
      <div>
        <div class="header-title"><span>echo</span></div>
        <div class="header-sub">Feedback memory</div>
      </div>
    </div>
    <button class="btn-add" id="btnAdd" aria-label="Add">+</button>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="feed">💬 Feed</button>
    <button class="tab" data-tab="tasks">✅ Tasks</button>
    <button class="tab" data-tab="insights">📊 Insights</button>
    <button class="tab" data-tab="search">🔍 Search</button>
  </div>

  <div class="scroll-area" id="scrollArea"></div>
</div>

<!-- Add/Edit Feedback Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">New Feedback</div>
    <label>What did he say?</label>
    <textarea id="feedbackText" placeholder="Write the feedback as you remember it…"></textarea>
    <label>Category</label>
    <div class="category-grid" id="categoryGrid"></div>
    <label>Context / note (optional)</label>
    <input type="text" id="contextNote" placeholder="e.g. after dinner, about the report…"/>
    <button class="btn-primary" id="btnSave">Save Feedback</button>
    <button class="btn-danger" id="btnDelete" style="display:none">Delete this entry</button>
    <button class="btn-secondary" id="btnCancel">Cancel</button>
  </div>
</div>

<!-- Add/Edit Task Modal -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="taskModalTitle">New Task</div>
    <label>What do I need to do?</label>
    <textarea id="taskText" placeholder="Describe the task…"></textarea>
    <label>Urgency</label>
    <div class="urgency-grid" id="urgencyGrid"></div>
    <label>Due date</label>
    <input type="date" id="taskDue"/>
    <label>Reminder notification</label>
    <div class="notif-row">
      <span class="notif-label">Send me a reminder</span>
      <div class="toggle" id="notifToggle"></div>
    </div>
    <div id="notifTimeRow" style="display:none;margin-top:10px">
      <label style="margin-top:0">Remind me at</label>
      <input type="time" id="notifTime" value="09:00"/>
    </div>
    <label>Linked feedback (optional)</label>
    <select id="taskLinkedFeedback">
      <option value="">— none —</option>
    </select>
    <button class="btn-primary" id="btnTaskSave">Save Task</button>
    <button class="btn-danger" id="btnTaskDelete" style="display:none">Delete task</button>
    <button class="btn-secondary" id="btnTaskCancel">Cancel</button>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" id="detailContent"></div>
</div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const CATEGORIES = [
  { id:'communication', label:'Communication', icon:'💬', color:'#7c5cfc' },
  { id:'household',     label:'Household',     icon:'🏠', color:'#00b894' },
  { id:'emotional',     label:'Emotional',     icon:'💛', color:'#ff9f43' },
  { id:'work',          label:'Work / Career',  icon:'💼', color:'#a29bfe' },
  { id:'health',        label:'Health',         icon:'🌿', color:'#00cec9' },
  { id:'personal',      label:'Personal',       icon:'🪞', color:'#ff5fa0' },
  { id:'relationship',  label:'Relationship',   icon:'🔗', color:'#fd79a8' },
  { id:'habits',        label:'Habits',         icon:'🔄', color:'#74b9ff' },
  { id:'other',         label:'Other',          icon:'✦',  color:'#b2bec3' },
];

const URGENCIES = [
  { id:'critical', label:'🔴 Critical', emoji:'🔴', cls:'urgency-critical', color:'#ff5252' },
  { id:'high',     label:'🟠 High',     emoji:'🟠', cls:'urgency-high',     color:'#ff9f43' },
  { id:'medium',   label:'🟣 Medium',   emoji:'🟣', cls:'urgency-medium',   color:'#7c5cfc' },
  { id:'low',      label:'🟢 Low',      emoji:'🟢', cls:'urgency-low',      color:'#00b894' },
];

let data      = JSON.parse(localStorage.getItem('echo_data')  || '[]');
let tasks     = JSON.parse(localStorage.getItem('echo_tasks') || '[]');
let currentTab = 'feed';
let filterCat  = 'all';
let editingId  = null;
let editingTaskId = null;
let selectedCat   = null;
let selectedUrg   = null;
let notifEnabled  = false;
let searchQ = '';
let notifPermission = Notification?.permission || 'default';

function save()      { localStorage.setItem('echo_data',  JSON.stringify(data));  }
function saveTasks() { localStorage.setItem('echo_tasks', JSON.stringify(tasks)); }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function fmtDate(ts) {
  return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function fmtDateShort(ts) {
  return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function getCat(id)  { return CATEGORIES.find(c=>c.id===id) || CATEGORIES[8]; }
function getUrg(id)  { return URGENCIES.find(u=>u.id===id)  || URGENCIES[2]; }

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const due  = new Date(dateStr + 'T23:59:59');
  const now  = new Date();
  return Math.ceil((due - now) / 86400000);
}

function dueBadgeHtml(task) {
  if (!task.due) return '';
  const d = daysUntil(task.due);
  if (d < 0)  return `<span class="due-badge overdue">⚠ ${Math.abs(d)}d overdue</span>`;
  if (d === 0) return `<span class="due-badge overdue">⚠ Due today</span>`;
  if (d <= 3)  return `<span class="due-badge soon">⏰ ${d}d left</span>`;
  return `<span class="due-badge">📅 ${fmtDate(new Date(task.due))}</span>`;
}

function getSimilarIds(item) {
  const words = item.text.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/).filter(w=>w.length>3);
  return data.filter(d=>d.id!==item.id && d.category===item.category)
             .filter(d=>{ const dw=d.text.toLowerCase().replace(/[^a-z\s]/g,'').split(/\s+/); return words.some(w=>dw.includes(w)); })
             .map(d=>d.id);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Notifications ─────────────────────────────────────────────────────────────
async function requestNotifPermission() {
  if (!('Notification' in window)) return false;
  const perm = await Notification.requestPermission();
  notifPermission = perm;
  return perm === 'granted';
}

function scheduleNotification(task) {
  if (!task.notif || !task.notifTime || !task.due) return;
  if (notifPermission !== 'granted') return;
  const [h,m] = task.notifTime.split(':').map(Number);
  const dueDate = new Date(task.due + 'T' + task.notifTime + ':00');
  const now = new Date();
  const delay = dueDate - now;
  if (delay > 0 && delay < 86400000 * 7) {
    setTimeout(() => {
      try {
        new Notification('Echo reminder 🌀', {
          body: task.text,
          icon: '/icon-192.png',
          tag: 'echo-task-' + task.id,
        });
      } catch(e){}
    }, delay);
  }
}

function scheduleAllNotifications() {
  tasks.filter(t=>!t.done && t.notif).forEach(scheduleNotification);
}

// ── Render dispatcher ─────────────────────────────────────────────────────────
function render() {
  const area = document.getElementById('scrollArea');
  if (currentTab === 'feed')     renderFeed(area);
  else if (currentTab === 'tasks')    renderTasks(area);
  else if (currentTab === 'insights') renderInsights(area);
  else renderSearch(area);
}

// ── Feed ──────────────────────────────────────────────────────────────────────
function renderFeed(area) {
  const usedCats = [...new Set(data.map(d=>d.category))];
  let items = filterCat==='all' ? data : data.filter(d=>d.category===filterCat);
  items = [...items].sort((a,b)=>b.occurrences[b.occurrences.length-1].ts - a.occurrences[a.occurrences.length-1].ts);

  const total = data.length;
  const recurring = data.filter(d=>d.occurrences.length>1).length;
  const now = new Date();
  const thisMonth = data.filter(d=>{
    const last = d.occurrences[d.occurrences.length-1].ts;
    const m = new Date(last);
    return m.getMonth()===now.getMonth() && m.getFullYear()===now.getFullYear();
  }).length;

  let html = `<div class="stats-bar">
    <div class="stat-pill"><div class="stat-num pink">${total}</div><div class="stat-label">Total</div></div>
    <div class="stat-pill"><div class="stat-num purple">${recurring}</div><div class="stat-label">Recurring</div></div>
    <div class="stat-pill"><div class="stat-num orange">${thisMonth}</div><div class="stat-label">This month</div></div>
  </div>`;

  html += `<div class="filter-row"><div class="chip ${filterCat==='all'?'active':''}" data-filter="all">All</div>`;
  usedCats.forEach(c=>{
    const cat=getCat(c);
    html+=`<div class="chip ${filterCat===c?'active':''}" data-filter="${c}">${cat.icon} ${cat.label}</div>`;
  });
  html += `</div>`;

  if (items.length === 0) {
    html += `<div class="empty"><div class="empty-icon">🌱</div><div class="empty-text">Nothing yet!<br/>Tap + to log your first feedback.</div></div>`;
  } else {
    items.forEach(item=>{
      const cat=getCat(item.category);
      const count=item.occurrences.length;
      const lastTs=item.occurrences[item.occurrences.length-1].ts;
      html+=`<div class="card" data-id="${item.id}">
        <div class="card-accent-bar" style="background:${cat.color}"></div>
        <div class="card-content">${escHtml(item.text)}</div>
        <div class="card-meta">
          <span class="badge badge-category" style="color:${cat.color};border-color:${cat.color}44;background:${cat.color}15">${cat.icon} ${cat.label}</span>
          ${count>1?`<span class="badge badge-count">×${count}</span>`:''}
          <span class="badge badge-date">${fmtDate(lastTs)}</span>
        </div>
        ${count>1?`<div class="card-footer"><span class="recurrence-dot"></span><span class="recurrence-label">Recurring · first ${fmtDateShort(item.occurrences[0].ts)}</span></div>`:''}
      </div>`;
    });
  }

  area.innerHTML = html;
  area.querySelectorAll('[data-filter]').forEach(el=>el.addEventListener('click',()=>{ filterCat=el.dataset.filter; render(); }));
  area.querySelectorAll('.card[data-id]').forEach(el=>el.addEventListener('click',()=>openDetail(el.dataset.id)));
}

// ── Tasks ─────────────────────────────────────────────────────────────────────
function renderTasks(area) {
  const pending  = tasks.filter(t=>!t.done).sort((a,b)=>{
    const urgOrder={critical:0,high:1,medium:2,low:3};
    if (urgOrder[a.urgency] !== urgOrder[b.urgency]) return urgOrder[a.urgency]-urgOrder[b.urgency];
    if (a.due && b.due) return new Date(a.due)-new Date(b.due);
    return 0;
  });
  const done = tasks.filter(t=>t.done);
  const overdue = pending.filter(t=>t.due && daysUntil(t.due)<0).length;

  let html = '';

  // Notification permission banner
  if (notifPermission === 'default' && tasks.some(t=>t.notif)) {
    html += `<div class="notif-banner">
      <div class="notif-banner-text">🔔 Enable notifications to get reminders for your tasks.</div>
      <button class="notif-banner-btn" id="btnEnableNotif">Enable</button>
    </div>`;
  }

  // Mini stats
  html += `<div class="stats-bar">
    <div class="stat-pill"><div class="stat-num pink">${pending.length}</div><div class="stat-label">Pending</div></div>
    <div class="stat-pill"><div class="stat-num" style="color:var(--red)">${overdue}</div><div class="stat-label">Overdue</div></div>
    <div class="stat-pill"><div class="stat-num" style="color:var(--green)">${done.length}</div><div class="stat-label">Done</div></div>
  </div>`;

  if (tasks.length === 0) {
    html += `<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">No tasks yet.<br/>Tap + to add a task linked to feedback.</div></div>`;
  } else {
    if (pending.length) {
      html += `<div class="section-header">Pending</div>`;
      pending.forEach(t=>{ html += taskCardHtml(t); });
    }
    if (done.length) {
      html += `<div class="section-header" style="margin-top:20px">Completed</div>`;
      done.forEach(t=>{ html += taskCardHtml(t); });
    }
  }

  area.innerHTML = html;

  const eb = area.querySelector('#btnEnableNotif');
  if (eb) eb.addEventListener('click', async ()=>{ await requestNotifPermission(); render(); });

  area.querySelectorAll('.task-card[data-tid]').forEach(el=>{
    el.addEventListener('click', e=>{
      if (e.target.closest('.task-check')) return;
      openTaskDetail(el.dataset.tid);
    });
  });
  area.querySelectorAll('.task-check').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      const t = tasks.find(t=>t.id===el.dataset.tid);
      if (t) { t.done = !t.done; saveTasks(); render(); }
    });
  });
}

function taskCardHtml(t) {
  const urg = getUrg(t.urgency);
  const linked = t.linkedFeedback ? data.find(d=>d.id===t.linkedFeedback) : null;
  return `<div class="task-card ${t.done?'done':''}" data-tid="${t.id}">
    <div class="urgency-bar" style="background:${urg.color}"></div>
    <div style="padding-right:44px">
      <div class="task-title">${escHtml(t.text)}</div>
      <div class="task-meta">
        <span class="urgency-badge ${urg.cls}">${urg.emoji} ${urg.id}</span>
        ${dueBadgeHtml(t)}
        ${t.notif?`<span class="task-notif-dot" title="Reminder on"></span>`:''}
        ${linked?`<span class="linked-chip">🔗 ${escHtml(linked.text.slice(0,30))}${linked.text.length>30?'…':''}</span>`:''}
      </div>
    </div>
    <div class="task-check ${t.done?'checked':''}" data-tid="${t.id}">${t.done?'✓':''}</div>
  </div>`;
}

function openTaskDetail(id) {
  const t = tasks.find(t=>t.id===id);
  if (!t) return;
  const urg = getUrg(t.urgency);
  const linked = t.linkedFeedback ? data.find(d=>d.id===t.linkedFeedback) : null;
  const content = document.getElementById('detailContent');
  content.innerHTML = `
    <div class="modal-handle"></div>
    <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:16px">
      <div style="flex:1">
        <span class="urgency-badge ${urg.cls}" style="margin-bottom:8px;display:inline-block">${urg.emoji} ${urg.id}</span>
        <div style="font-size:1.05rem;font-weight:600;color:var(--text);line-height:1.4">${escHtml(t.text)}</div>
      </div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">
      ${t.due?`<div style="background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:8px 12px;font-family:var(--font-mono);font-size:0.7rem;color:var(--text-dim)">📅 Due ${fmtDate(new Date(t.due))}</div>`:''}
      ${t.notif&&t.notifTime?`<div style="background:rgba(124,92,252,0.08);border:2px solid rgba(124,92,252,0.2);border-radius:10px;padding:8px 12px;font-family:var(--font-mono);font-size:0.7rem;color:var(--accent2)">🔔 Reminder at ${t.notifTime}</div>`:''}
    </div>
    ${linked?`<div style="background:rgba(124,92,252,0.06);border:2px solid rgba(124,92,252,0.15);border-radius:12px;padding:12px;margin-bottom:16px">
      <div style="font-family:var(--font-mono);font-size:0.6rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent2);margin-bottom:6px">🔗 Linked Feedback</div>
      <div style="font-size:0.9rem;color:var(--text-dim);line-height:1.4">${escHtml(linked.text)}</div>
    </div>`:''}
    <button class="btn-primary" id="btnToggleDone">${t.done?'Mark as pending':'Mark as done ✓'}</button>
    <button class="btn-primary" id="btnTaskEdit" style="background:white;color:var(--accent2);border:2px solid var(--accent2);box-shadow:none;margin-top:10px">Edit task</button>
    <button class="btn-secondary" id="btnDetailCloseTask">Close</button>
  `;
  document.getElementById('detailModal').classList.add('open');
  content.querySelector('#btnToggleDone').addEventListener('click',()=>{
    t.done=!t.done; saveTasks(); closeDetail(); render();
  });
  content.querySelector('#btnTaskEdit').addEventListener('click',()=>{ closeDetail(); openTaskEdit(id); });
  content.querySelector('#btnDetailCloseTask').addEventListener('click', closeDetail);
  document.getElementById('detailModal').addEventListener('click',e=>{ if(e.target===document.getElementById('detailModal')) closeDetail(); },{once:true});
}

// ── Task modal ─────────────────────────────────────────────────────────────────
function openTaskAdd() {
  editingTaskId = null;
  selectedUrg = null;
  notifEnabled = false;
  document.getElementById('taskText').value = '';
  document.getElementById('taskDue').value = '';
  document.getElementById('notifTime').value = '09:00';
  document.getElementById('taskModalTitle').textContent = 'New Task';
  document.getElementById('btnTaskDelete').style.display = 'none';
  document.getElementById('notifToggle').classList.remove('on');
  document.getElementById('notifTimeRow').style.display = 'none';
  buildUrgencyGrid();
  populateLinkedFeedback(null);
  document.getElementById('taskModal').classList.add('open');
  setTimeout(()=>document.getElementById('taskText').focus(), 350);
}

function openTaskEdit(id) {
  const t = tasks.find(t=>t.id===id);
  if (!t) return;
  editingTaskId = id;
  selectedUrg = t.urgency;
  notifEnabled = t.notif || false;
  document.getElementById('taskText').value = t.text;
  document.getElementById('taskDue').value = t.due || '';
  document.getElementById('notifTime').value = t.notifTime || '09:00';
  document.getElementById('taskModalTitle').textContent = 'Edit Task';
  document.getElementById('btnTaskDelete').style.display = 'block';
  document.getElementById('notifToggle').classList.toggle('on', notifEnabled);
  document.getElementById('notifTimeRow').style.display = notifEnabled ? 'block' : 'none';
  buildUrgencyGrid();
  populateLinkedFeedback(t.linkedFeedback || null);
  document.getElementById('taskModal').classList.add('open');
}

function buildUrgencyGrid() {
  const grid = document.getElementById('urgencyGrid');
  grid.innerHTML = URGENCIES.map(u=>`
    <div class="urg-btn ${selectedUrg===u.id?'selected-'+u.id:''}" data-urg="${u.id}">
      <span style="font-size:1.3rem">${u.emoji}</span>${u.id}
    </div>`).join('');
  grid.querySelectorAll('.urg-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      selectedUrg = btn.dataset.urg;
      grid.querySelectorAll('.urg-btn').forEach(b=>{
        b.className = 'urg-btn';
        if (b.dataset.urg===selectedUrg) b.classList.add('selected-'+selectedUrg);
      });
    });
  });
}

function populateLinkedFeedback(selectedId) {
  const sel = document.getElementById('taskLinkedFeedback');
  sel.innerHTML = '<option value="">— none —</option>';
  data.forEach(d=>{
    const opt = document.createElement('option');
    opt.value = d.id;
    opt.textContent = d.text.slice(0,60) + (d.text.length>60?'…':'');
    if (d.id === selectedId) opt.selected = true;
    sel.appendChild(opt);
  });
}

function closeTaskModal() { document.getElementById('taskModal').classList.remove('open'); }

document.getElementById('notifToggle').addEventListener('click', async ()=>{
  if (!notifEnabled && notifPermission !== 'granted') {
    const ok = await requestNotifPermission();
    if (!ok) { alert('Please enable notifications in your browser settings.'); return; }
  }
  notifEnabled = !notifEnabled;
  document.getElementById('notifToggle').classList.toggle('on', notifEnabled);
  document.getElementById('notifTimeRow').style.display = notifEnabled ? 'block' : 'none';
});

document.getElementById('btnTaskSave').addEventListener('click', ()=>{
  const text = document.getElementById('taskText').value.trim();
  if (!text) { document.getElementById('taskText').focus(); return; }
  if (!selectedUrg) { alert('Please pick an urgency level.'); return; }
  const due = document.getElementById('taskDue').value;
  const notifTime = document.getElementById('notifTime').value;
  const linkedFeedback = document.getElementById('taskLinkedFeedback').value || null;

  if (editingTaskId) {
    const t = tasks.find(t=>t.id===editingTaskId);
    Object.assign(t, { text, urgency:selectedUrg, due, notif:notifEnabled, notifTime, linkedFeedback });
    if (notifEnabled) scheduleNotification(t);
  } else {
    const t = { id:uid(), text, urgency:selectedUrg, due, notif:notifEnabled, notifTime, linkedFeedback, done:false, createdAt:Date.now() };
    tasks.push(t);
    if (notifEnabled) scheduleNotification(t);
  }
  saveTasks(); closeTaskModal(); render();
});

document.getElementById('btnTaskDelete').addEventListener('click', ()=>{
  if (confirm('Delete this task?')) {
    tasks = tasks.filter(t=>t.id!==editingTaskId);
    saveTasks(); closeTaskModal(); render();
  }
});
document.getElementById('btnTaskCancel').addEventListener('click', closeTaskModal);
document.getElementById('taskModal').addEventListener('click', e=>{ if(e.target===document.getElementById('taskModal')) closeTaskModal(); });

// ── Insights ──────────────────────────────────────────────────────────────────
function renderInsights(area) {
  if (!data.length) {
    area.innerHTML = `<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Add some feedback first<br/>to see insights.</div></div>`;
    return;
  }
  const catCounts = {};
  data.forEach(d=>{ catCounts[d.category]=(catCounts[d.category]||0)+d.occurrences.length; });
  const maxCat = Math.max(...Object.values(catCounts));
  const sortedCats = Object.entries(catCounts).sort((a,b)=>b[1]-a[1]);
  const recurring = [...data].filter(d=>d.occurrences.length>1).sort((a,b)=>b.occurrences.length-a.occurrences.length).slice(0,5);
  const now = new Date();
  const months = [];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    months.push({label:d.toLocaleDateString('en-US',{month:'short'}),count:0,key:`${d.getFullYear()}-${d.getMonth()}`});
  }
  data.forEach(item=>item.occurrences.forEach(occ=>{
    const d=new Date(occ.ts); const key=`${d.getFullYear()}-${d.getMonth()}`;
    const m=months.find(m=>m.key===key); if(m) m.count++;
  }));
  const maxMonth=Math.max(...months.map(m=>m.count),1);

  const GRAD_COLORS = ['#ff5fa0','#7c5cfc','#ff9f43','#00cec9','#fd79a8','#00b894','#a29bfe','#74b9ff','#b2bec3'];

  let html = `<div class="insight-section"><div class="insight-title">💬 By Category</div>`;
  sortedCats.forEach(([cid,count],i)=>{
    const cat=getCat(cid);
    html+=`<div class="bar-row">
      <div class="bar-label">${cat.icon} ${cat.label}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(count/maxCat*100)}%;background:linear-gradient(90deg,${cat.color}88,${cat.color})"></div></div>
      <div class="bar-count">${count}</div>
    </div>`;
  });
  html+=`</div>`;

  html+=`<div class="insight-section"><div class="insight-title">📅 Monthly Activity</div>
    <div style="display:flex;gap:6px;align-items:flex-end;height:70px">`;
  months.forEach((m,i)=>{
    const h=m.count?Math.max(10,Math.round(m.count/maxMonth*54)):4;
    const col = m.count ? `linear-gradient(180deg,${GRAD_COLORS[i%GRAD_COLORS.length]},${GRAD_COLORS[(i+3)%GRAD_COLORS.length]})` : 'var(--border)';
    html+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="width:100%;height:${h}px;background:${col};border-radius:5px 5px 0 0"></div>
      <div style="font-family:var(--font-mono);font-size:0.55rem;color:var(--text-dimmer)">${m.label}</div>
    </div>`;
  });
  html+=`</div></div>`;

  // Task urgency breakdown
  if (tasks.length) {
    const urgCounts = {};
    tasks.forEach(t=>{ urgCounts[t.urgency]=(urgCounts[t.urgency]||0)+1; });
    html+=`<div class="insight-section"><div class="insight-title">✅ Task Urgency</div>`;
    URGENCIES.forEach(u=>{
      if (!urgCounts[u.id]) return;
      html+=`<div class="bar-row">
        <div class="bar-label">${u.emoji} ${u.id}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.round(urgCounts[u.id]/tasks.length*100)}%;background:${u.color}"></div></div>
        <div class="bar-count">${urgCounts[u.id]}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  if (recurring.length) {
    html+=`<div class="insight-section"><div class="insight-title">🔄 Most Recurring</div>`;
    recurring.forEach(item=>{
      const cat=getCat(item.category);
      html+=`<div class="card" data-id="${item.id}" style="margin-bottom:10px">
        <div class="card-accent-bar" style="background:${cat.color}"></div>
        <div class="card-content">${escHtml(item.text.slice(0,80))}${item.text.length>80?'…':''}</div>
        <div class="card-meta" style="margin-top:6px">
          <span class="badge badge-count">×${item.occurrences.length}</span>
          <span class="badge badge-date">${fmtDate(item.occurrences[0].ts)} → ${fmtDate(item.occurrences[item.occurrences.length-1].ts)}</span>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }

  area.innerHTML = html;
  area.querySelectorAll('.card[data-id]').forEach(el=>el.addEventListener('click',()=>openDetail(el.dataset.id)));
}

// ── Search ─────────────────────────────────────────────────────────────────────
function renderSearch(area) {
  let html=`<div class="search-box"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="Search feedback…" value="${escHtml(searchQ)}"/></div>`;
  const q=searchQ.toLowerCase().trim();
  const results=q?data.filter(d=>d.text.toLowerCase().includes(q)||(d.occurrences.some(o=>o.note&&o.note.toLowerCase().includes(q)))||getCat(d.category).label.toLowerCase().includes(q)):data;
  const sorted=[...results].sort((a,b)=>b.occurrences[b.occurrences.length-1].ts-a.occurrences[a.occurrences.length-1].ts);
  if (!sorted.length) {
    html+=`<div class="empty"><div class="empty-icon">🔎</div><div class="empty-text">${q?'No results found.':'Start typing to search.'}</div></div>`;
  } else {
    sorted.forEach(item=>{
      const cat=getCat(item.category); const count=item.occurrences.length;
      html+=`<div class="card" data-id="${item.id}">
        <div class="card-accent-bar" style="background:${cat.color}"></div>
        <div class="card-content">${escHtml(item.text)}</div>
        <div class="card-meta" style="margin-top:8px">
          <span class="badge badge-category" style="color:${cat.color};border-color:${cat.color}44;background:${cat.color}15">${cat.icon} ${cat.label}</span>
          ${count>1?`<span class="badge badge-count">×${count}</span>`:''}
        </div>
      </div>`;
    });
  }
  area.innerHTML=html;
  const si=area.querySelector('#searchInput');
  if(si){ si.addEventListener('input',e=>{ searchQ=e.target.value; renderSearch(area); }); si.focus(); }
  area.querySelectorAll('.card[data-id]').forEach(el=>el.addEventListener('click',()=>openDetail(el.dataset.id)));
}

// ── Detail modal (feedback) ───────────────────────────────────────────────────
function openDetail(id) {
  const item=data.find(d=>d.id===id);
  if(!item) return;
  const cat=getCat(item.category);
  const similar=getSimilarIds(item);
  let occ='';
  [...item.occurrences].reverse().forEach(o=>{
    occ+=`<div class="occ-item"><span class="occ-date">${fmtDate(o.ts)}</span><span class="occ-note">${escHtml(o.note||'—')}</span></div>`;
  });
  let tlHtml='';
  item.occurrences.forEach((o,i)=>{
    tlHtml+=`<div class="tl-dot" title="${fmtDate(o.ts)}" style="color:${cat.color}"></div>`;
    if(i<item.occurrences.length-1) tlHtml+=`<div class="tl-line"></div>`;
  });
  const relatedTasks = tasks.filter(t=>t.linkedFeedback===id);
  const content=document.getElementById('detailContent');
  content.innerHTML=`
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:10px">
      <div>
        <div style="font-family:var(--font-mono);font-size:0.6rem;text-transform:uppercase;letter-spacing:0.1em;color:${cat.color};margin-bottom:6px">${cat.icon} ${cat.label}</div>
        <div style="font-size:1.05rem;font-weight:500;line-height:1.4;color:var(--text);max-width:270px">${escHtml(item.text)}</div>
      </div>
      <div style="text-align:center;background:rgba(255,95,160,0.1);border:2px solid rgba(255,95,160,0.2);border-radius:12px;padding:10px 16px;flex-shrink:0">
        <div style="font-size:2rem;font-weight:700;color:var(--accent);line-height:1">${item.occurrences.length}</div>
        <div style="font-family:var(--font-mono);font-size:0.55rem;color:var(--text-dimmer);text-transform:uppercase;letter-spacing:0.06em">times</div>
      </div>
    </div>
    ${item.occurrences.length>1?`<div style="margin-bottom:16px">
      <div class="timeline-label">Timeline</div>
      <div class="timeline-track">${tlHtml}</div>
      <div style="font-family:var(--font-mono);font-size:0.58rem;color:var(--text-dimmer);margin-top:6px">First: ${fmtDate(item.occurrences[0].ts)} · Last: ${fmtDate(item.occurrences[item.occurrences.length-1].ts)}</div>
    </div>`:''}
    <div style="font-family:var(--font-mono);font-size:0.62rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dimmer);margin-bottom:8px">All occurrences</div>
    <div class="occurrence-list">${occ}</div>
    ${similar.length?`<div style="margin-top:14px;font-family:var(--font-mono);font-size:0.6rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);margin-bottom:4px">⟳ Similar feedback found</div>`:''}
    ${relatedTasks.length?`<div style="margin-top:14px;font-family:var(--font-mono);font-size:0.6rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent2);margin-bottom:6px">✅ ${relatedTasks.length} linked task${relatedTasks.length>1?'s':''}</div>`:''}
    <button class="btn-primary" id="btnLogAgain" style="margin-top:20px">Log it happened again</button>
    <button class="btn-primary" id="btnEdit" style="background:white;color:var(--accent2);border:2px solid var(--accent2);box-shadow:none;margin-top:10px">Edit feedback</button>
    <button class="btn-secondary" id="btnDetailClose">Close</button>
  `;
  document.getElementById('detailModal').classList.add('open');
  content.querySelector('#btnLogAgain').addEventListener('click',()=>{
    const note=prompt('Any context for this occurrence? (optional)','');
    item.occurrences.push({ts:Date.now(),note:note||''});
    save(); closeDetail(); render();
  });
  content.querySelector('#btnEdit').addEventListener('click',()=>{ closeDetail(); openEdit(id); });
  content.querySelector('#btnDetailClose').addEventListener('click',closeDetail);
  document.getElementById('detailModal').addEventListener('click',e=>{ if(e.target===document.getElementById('detailModal')) closeDetail(); },{once:true});
}

function closeDetail() { document.getElementById('detailModal').classList.remove('open'); }

// ── Feedback add/edit ─────────────────────────────────────────────────────────
function openAdd() {
  editingId=null; selectedCat=null;
  document.getElementById('feedbackText').value='';
  document.getElementById('contextNote').value='';
  document.getElementById('modalTitle').textContent='New Feedback';
  document.getElementById('btnDelete').style.display='none';
  buildCategoryGrid();
  document.getElementById('addModal').classList.add('open');
  setTimeout(()=>document.getElementById('feedbackText').focus(),350);
}

function openEdit(id) {
  const item=data.find(d=>d.id===id);
  if(!item) return;
  editingId=id; selectedCat=item.category;
  document.getElementById('feedbackText').value=item.text;
  document.getElementById('contextNote').value=item.occurrences[0]?.note||'';
  document.getElementById('modalTitle').textContent='Edit Feedback';
  document.getElementById('btnDelete').style.display='block';
  buildCategoryGrid();
  document.getElementById('addModal').classList.add('open');
}

function buildCategoryGrid() {
  const grid=document.getElementById('categoryGrid');
  grid.innerHTML=CATEGORIES.map(c=>`
    <div class="cat-btn ${selectedCat===c.id?'selected':''}" data-cat="${c.id}">
      <span class="cat-icon">${c.icon}</span>${c.label}
    </div>`).join('');
  grid.querySelectorAll('.cat-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      selectedCat=btn.dataset.cat;
      grid.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });
}

function closeAdd() { document.getElementById('addModal').classList.remove('open'); }

document.getElementById('btnAdd').addEventListener('click',()=>{
  if (currentTab === 'tasks') openTaskAdd();
  else openAdd();
});
document.getElementById('btnCancel').addEventListener('click',closeAdd);
document.getElementById('addModal').addEventListener('click',e=>{ if(e.target===document.getElementById('addModal')) closeAdd(); });

document.getElementById('btnSave').addEventListener('click',()=>{
  const text=document.getElementById('feedbackText').value.trim();
  const note=document.getElementById('contextNote').value.trim();
  if(!text){ document.getElementById('feedbackText').focus(); return; }
  if(!selectedCat){ alert('Please select a category.'); return; }
  if(editingId){
    const item=data.find(d=>d.id===editingId);
    item.text=text; item.category=selectedCat;
    if(item.occurrences[0]) item.occurrences[0].note=note;
  } else {
    data.push({ id:uid(), text, category:selectedCat, occurrences:[{ts:Date.now(),note}] });
  }
  save(); closeAdd(); render();
});

document.getElementById('btnDelete').addEventListener('click',()=>{
  if(confirm('Delete this feedback?')){ data=data.filter(d=>d.id!==editingId); save(); closeAdd(); render(); }
});

// ── Tabs ──────────────────────────────────────────────────────────────────────
document.getElementById('tabs').querySelectorAll('.tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    currentTab=tab.dataset.tab;
    render();
  });
});

// ── Boot ──────────────────────────────────────────────────────────────────────
scheduleAllNotifications();
render();
</script>
</body>
</html>
