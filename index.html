<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Echo — Feedback Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;1,300;1,500&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#fff8f0; --surface:#ffffff; --border:#f0d6e8;
  --accent:#ff5fa0; --accent2:#7c5cfc; --accent3:#ff9f43;
  --green:#00b894; --red:#ff5252;
  --text:#2d2040; --text-dim:#7a6a8a; --text-dimmer:#b8a8c8;
  --radius:18px; --radius-sm:12px;
  --font-body:'Fraunces',Georgia,serif; --font-mono:'DM Mono',monospace;
  --shadow-sm:0 2px 10px rgba(124,92,252,0.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

/* KEY FIX: body must NOT have overflow:hidden — modals are position:fixed and need the viewport */
html{ height:100%; }
body{ height:100%; background:var(--bg); color:var(--text); font-family:var(--font-body); }

/* Ambient glow — pointer-events:none so it never blocks clicks */
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 70% 40% at 10% 0%,rgba(255,95,160,.12) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 100%,rgba(124,92,252,.10) 0%,transparent 60%);
}

/* App shell — NO z-index here, so modals (fixed, z:100) always float above */
#app{
  position:relative; display:flex; flex-direction:column;
  height:100%; max-width:480px; margin:0 auto;
}

/* ── Header ── */
.header{
  padding:18px 20px 14px; display:flex; align-items:center; justify-content:space-between;
  background:rgba(255,248,240,.95); backdrop-filter:blur(12px);
  border-bottom:2px solid var(--border); position:sticky; top:0; z-index:10;
  flex-shrink:0;
}
.header-logo{display:flex;align-items:center;gap:10px;}
.header-dot{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;box-shadow:0 3px 12px rgba(255,95,160,.4);
}
.header-title{font-size:1.5rem;font-weight:700;letter-spacing:-.02em;line-height:1;}
.header-title span{color:var(--accent);font-style:italic;}
.header-sub{font-family:var(--font-mono);font-size:.6rem;color:var(--text-dimmer);letter-spacing:.08em;text-transform:uppercase;margin-top:1px;}
.btn-add{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;cursor:pointer;color:#fff;font-size:1.5rem;line-height:1;
  box-shadow:0 4px 16px rgba(255,95,160,.45);
  transition:transform .15s,box-shadow .15s;
  display:flex;align-items:center;justify-content:center;
}
.btn-add:active{transform:scale(.90);box-shadow:none;}

/* ── Tabs ── */
.tabs{display:flex;gap:4px;padding:12px 16px 0;background:var(--bg);overflow-x:auto;flex-shrink:0;}
.tabs::-webkit-scrollbar{display:none;}
.tab{
  font-family:var(--font-mono);font-size:.68rem;letter-spacing:.05em;text-transform:uppercase;
  padding:8px 16px;border-radius:30px;border:2px solid transparent;
  background:transparent;color:var(--text-dimmer);cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0;
}
.tab.active{background:var(--surface);border-color:var(--accent);color:var(--accent);box-shadow:var(--shadow-sm);}

/* ── Scroll area ── */
.scroll-area{flex:1;overflow-y:auto;padding:16px 16px 100px;-webkit-overflow-scrolling:touch;}
.scroll-area::-webkit-scrollbar{display:none;}

/* ── Stats ── */
.stats-bar{display:flex;gap:10px;margin-bottom:16px;}
.stat-pill{flex:1;background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-sm);padding:12px 10px;text-align:center;box-shadow:var(--shadow-sm);}
.stat-num{font-size:1.6rem;font-weight:700;line-height:1;}
.stat-label{font-family:var(--font-mono);font-size:.58rem;color:var(--text-dimmer);text-transform:uppercase;letter-spacing:.07em;margin-top:3px;}

/* ── Filter chips ── */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.chip{
  font-family:var(--font-mono);font-size:.63rem;letter-spacing:.04em;padding:6px 13px;
  border-radius:30px;background:var(--surface);border:2px solid var(--border);
  color:var(--text-dim);cursor:pointer;transition:all .2s;white-space:nowrap;box-shadow:var(--shadow-sm);
}
.chip.active{border-color:var(--accent2);color:var(--accent2);background:rgba(124,92,252,.08);}

/* ── Cards ── */
.card{
  background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);
  padding:16px 16px 14px;margin-bottom:12px;position:relative;overflow:hidden;
  cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .15s;
}
.card:active{transform:scale(.982);}
.card-accent-bar{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px;}
.card-content{font-size:1rem;font-weight:500;line-height:1.45;color:var(--text);padding-left:10px;}
.card-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding-left:10px;margin-top:8px;}
.badge{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.05em;text-transform:uppercase;padding:3px 10px;border-radius:30px;white-space:nowrap;}
.badge-count{background:rgba(255,95,160,.12);color:var(--accent);border:1.5px solid rgba(255,95,160,.3);}
.badge-date{color:var(--text-dimmer);font-size:.57rem;}
.badge-category{border:1.5px solid;}
.card-footer{margin-top:10px;padding-top:8px;border-top:1.5px dashed var(--border);display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding-left:10px;}
.recurrence-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;margin-right:3px;vertical-align:middle;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.recurrence-label{font-family:var(--font-mono);font-size:.6rem;color:var(--accent);}

/* ── Task cards ── */
.task-card{
  background:var(--surface);border:2px solid var(--border);border-radius:var(--radius);
  padding:14px 50px 14px 16px;margin-bottom:10px;position:relative;
  cursor:pointer;box-shadow:var(--shadow-sm);transition:transform .15s;
}
.task-card:active{transform:scale(.982);}
.task-card.done{opacity:.55;}
.task-card.done .task-title{text-decoration:line-through;color:var(--text-dimmer);}
.urgency-bar{position:absolute;left:0;top:0;bottom:0;width:5px;border-radius:5px 0 0 5px;}
.task-title{font-size:.95rem;font-weight:600;color:var(--text);padding-left:10px;line-height:1.35;margin-bottom:8px;}
.task-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding-left:10px;}
.urgency-badge{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.05em;text-transform:uppercase;padding:3px 10px;border-radius:30px;font-weight:500;}
.urgency-critical{background:rgba(255,82,82,.15);color:var(--red);border:1.5px solid rgba(255,82,82,.3);}
.urgency-high{background:rgba(255,159,67,.15);color:var(--accent3);border:1.5px solid rgba(255,159,67,.3);}
.urgency-medium{background:rgba(124,92,252,.12);color:var(--accent2);border:1.5px solid rgba(124,92,252,.25);}
.urgency-low{background:rgba(0,184,148,.12);color:var(--green);border:1.5px solid rgba(0,184,148,.25);}
.due-badge{font-family:var(--font-mono);font-size:.6rem;color:var(--text-dim);}
.due-badge.overdue{color:var(--red);font-weight:600;}
.due-badge.soon{color:var(--accent3);font-weight:600;}
.task-check{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  width:30px;height:30px;border-radius:50%;border:2px solid var(--border);
  background:var(--bg);display:flex;align-items:center;justify-content:center;
  font-size:.9rem;cursor:pointer;transition:all .2s;
}
.task-check.checked{background:var(--green);border-color:var(--green);color:white;}
.section-header{
  font-family:var(--font-mono);font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;
  color:var(--text-dimmer);margin:16px 0 8px;display:flex;align-items:center;gap:8px;
}
.section-header::after{content:'';flex:1;height:1px;background:var(--border);}
.linked-chip{
  font-family:var(--font-mono);font-size:.58rem;background:rgba(124,92,252,.08);color:var(--accent2);
  border:1.5px solid rgba(124,92,252,.2);border-radius:20px;padding:2px 8px;
  max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(--accent2);display:inline-block;margin-left:4px;vertical-align:middle;}

/* ── Empty ── */
.empty{text-align:center;padding:60px 20px;color:var(--text-dimmer);}
.empty-icon{font-size:3rem;margin-bottom:14px;}
.empty-text{font-size:.95rem;font-style:italic;line-height:1.6;}

/* ── Insights ── */
.insight-section{margin-bottom:24px;}
.insight-title{
  font-family:var(--font-mono);font-size:.65rem;color:var(--text-dimmer);
  text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px;
  padding-bottom:8px;border-bottom:2px solid var(--border);
}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.bar-label{font-size:.8rem;width:120px;flex-shrink:0;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;height:8px;background:var(--border);border-radius:10px;overflow:hidden;}
.bar-fill{height:100%;border-radius:10px;transition:width .7s cubic-bezier(.16,1,.3,1);}
.bar-count{font-family:var(--font-mono);font-size:.65rem;color:var(--text-dimmer);width:22px;text-align:right;flex-shrink:0;}

/* ── Notification banner ── */
.notif-banner{
  background:linear-gradient(135deg,rgba(124,92,252,.10),rgba(255,95,160,.07));
  border:2px solid rgba(124,92,252,.18);border-radius:var(--radius-sm);
  padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.notif-banner-text{font-size:.85rem;color:var(--text-dim);line-height:1.4;flex:1;}
.notif-banner-btn{
  background:linear-gradient(135deg,var(--accent2),var(--accent));color:white;
  border:none;border-radius:8px;padding:7px 14px;font-family:var(--font-mono);
  font-size:.62rem;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;white-space:nowrap;
}

/* ── Modal overlay — KEY: z-index 200, above everything ── */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(45,32,64,.55);
  z-index:200;
  display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .25s;
  backdrop-filter:blur(6px);
}
.modal-overlay.open{opacity:1;pointer-events:all;}

.modal{
  background:var(--surface);border:2px solid var(--border);
  border-radius:var(--radius) var(--radius) 0 0;
  width:100%;max-width:480px;
  padding:24px 20px 44px;
  transform:translateY(100%);
  transition:transform .32s cubic-bezier(.16,1,.3,1);
  max-height:92vh;overflow-y:auto;
  box-shadow:0 -8px 40px rgba(124,92,252,.15);
}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 22px;}
.modal-title{
  font-size:1.35rem;font-weight:700;margin-bottom:20px;font-style:italic;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── Form elements ── */
label{
  display:block;font-family:var(--font-mono);font-size:.65rem;letter-spacing:.08em;
  text-transform:uppercase;color:var(--text-dimmer);margin-bottom:7px;margin-top:18px;
}
label:first-of-type{margin-top:0;}
textarea,input[type=text],input[type=date],input[type=time],select{
  width:100%;background:var(--bg);border:2px solid var(--border);
  border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);
  font-size:1rem;padding:12px 14px;resize:none;outline:none;
  transition:border-color .2s;appearance:none;-webkit-appearance:none;
}
textarea:focus,input:focus,select:focus{border-color:var(--accent2);}
textarea{min-height:80px;}

.category-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px;}
.cat-btn{
  padding:11px 6px;border-radius:var(--radius-sm);background:var(--bg);
  border:2px solid var(--border);color:var(--text-dim);font-size:.75rem;
  text-align:center;cursor:pointer;transition:all .2s;line-height:1.3;
}
.cat-btn.selected{border-color:var(--accent2);background:rgba(124,92,252,.08);color:var(--accent2);}
.cat-icon{display:block;font-size:1.3rem;margin-bottom:3px;}

.urgency-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:4px;}
.urg-btn{
  padding:12px 8px;border-radius:var(--radius-sm);background:var(--bg);
  border:2px solid var(--border);color:var(--text-dim);font-family:var(--font-mono);
  font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;
  text-align:center;cursor:pointer;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:4px;
}
.urg-btn.sel-critical{border-color:var(--red);background:rgba(255,82,82,.10);color:var(--red);}
.urg-btn.sel-high{border-color:var(--accent3);background:rgba(255,159,67,.10);color:var(--accent3);}
.urg-btn.sel-medium{border-color:var(--accent2);background:rgba(124,92,252,.08);color:var(--accent2);}
.urg-btn.sel-low{border-color:var(--green);background:rgba(0,184,148,.08);color:var(--green);}

.notif-row{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--bg);border:2px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 14px;margin-top:4px;
}
.notif-label{font-size:.9rem;color:var(--text-dim);}
.toggle{
  width:44px;height:26px;border-radius:13px;background:var(--border);
  position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;
}
.toggle.on{background:linear-gradient(90deg,var(--accent),var(--accent2));}
.toggle::after{
  content:'';position:absolute;width:20px;height:20px;border-radius:50%;
  background:white;top:3px;left:3px;transition:transform .2s;
  box-shadow:0 1px 4px rgba(0,0,0,.2);
}
.toggle.on::after{transform:translateX(18px);}

.btn-primary{
  width:100%;margin-top:20px;padding:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:var(--radius-sm);color:white;
  font-family:var(--font-body);font-size:1rem;font-weight:700;cursor:pointer;
  transition:opacity .2s,transform .15s;
  box-shadow:0 4px 16px rgba(255,95,160,.35);
}
.btn-primary:active{transform:scale(.98);opacity:.9;}
.btn-secondary{
  width:100%;margin-top:10px;padding:14px;
  background:var(--bg);border:2px solid var(--border);border-radius:var(--radius-sm);
  color:var(--text-dim);font-family:var(--font-mono);font-size:.72rem;
  text-transform:uppercase;letter-spacing:.05em;cursor:pointer;transition:all .2s;
}
.btn-secondary:active{background:var(--border);}
.btn-danger{
  width:100%;margin-top:10px;padding:13px;
  background:transparent;border:2px solid rgba(255,82,82,.3);
  border-radius:var(--radius-sm);color:var(--red);
  font-family:var(--font-mono);font-size:.72rem;
  text-transform:uppercase;letter-spacing:.05em;cursor:pointer;transition:all .2s;
}
.btn-danger:active{background:rgba(255,82,82,.08);}

/* Occurrence */
.occ-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1.5px solid var(--border);font-size:.88rem;}
.occ-item:last-child{border-bottom:none;}
.occ-date{color:var(--text-dim);font-style:italic;}
.occ-note{font-family:var(--font-mono);font-size:.62rem;color:var(--text-dimmer);max-width:55%;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.timeline-label{font-family:var(--font-mono);font-size:.6rem;color:var(--text-dimmer);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.timeline-track{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.tl-dot{width:11px;height:11px;border-radius:50%;border:2px solid white;box-shadow:0 0 0 2px currentColor;}
.tl-line{flex:1;min-width:8px;height:2px;background:var(--border);}

/* Search */
.search-box{position:relative;margin-bottom:12px;}
.search-box input{padding-left:38px;font-size:.92rem;}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-dimmer);font-size:.9rem;pointer-events:none;}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-logo">
      <div class="header-dot">🌀</div>
      <div>
        <div class="header-title"><span>echo</span></div>
        <div class="header-sub">Feedback memory</div>
      </div>
    </div>
    <button class="btn-add" id="btnAdd">+</button>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="feed">💬 Feed</button>
    <button class="tab" data-tab="tasks">✅ Tasks</button>
    <button class="tab" data-tab="insights">📊 Insights</button>
    <button class="tab" data-tab="search">🔍 Search</button>
  </div>
  <div class="scroll-area" id="scrollArea"></div>
</div>

<!-- Modals live directly on body so no stacking context can clip them -->
<div class="modal-overlay" id="addModal">
  <div class="modal" id="addModalInner">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle">New Feedback</div>
    <label>What did he say?</label>
    <textarea id="feedbackText" placeholder="Write the feedback as you remember it…"></textarea>
    <label>Category</label>
    <div class="category-grid" id="categoryGrid"></div>
    <label>Context / note (optional)</label>
    <input type="text" id="contextNote" placeholder="e.g. after dinner, about the report…"/>
    <button class="btn-primary" id="btnSave">Save Feedback</button>
    <button class="btn-danger" id="btnDelete" style="display:none">Delete this entry</button>
    <button class="btn-secondary" id="btnCancel">Cancel</button>
  </div>
</div>

<div class="modal-overlay" id="taskModal">
  <div class="modal" id="taskModalInner">
    <div class="modal-handle"></div>
    <div class="modal-title" id="taskModalTitle">New Task</div>
    <label>What do I need to do?</label>
    <textarea id="taskText" placeholder="Describe the task…"></textarea>
    <label>Urgency</label>
    <div class="urgency-grid" id="urgencyGrid"></div>
    <label>Due date</label>
    <input type="date" id="taskDue"/>
    <label>Reminder notification</label>
    <div class="notif-row">
      <span class="notif-label">Send me a reminder</span>
      <div class="toggle" id="notifToggle"></div>
    </div>
    <div id="notifTimeRow" style="display:none;margin-top:10px">
      <label style="margin-top:0">Remind me at</label>
      <input type="time" id="notifTime" value="09:00"/>
    </div>
    <label>Linked feedback (optional)</label>
    <select id="taskLinkedFeedback"><option value="">— none —</option></select>
    <button class="btn-primary" id="btnTaskSave">Save Task</button>
    <button class="btn-danger" id="btnTaskDelete" style="display:none">Delete task</button>
    <button class="btn-secondary" id="btnTaskCancel">Cancel</button>
  </div>
</div>

<div class="modal-overlay" id="detailModal">
  <div class="modal" id="detailContent"></div>
</div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const CATS=[
  {id:'communication',label:'Communication',icon:'💬',color:'#7c5cfc'},
  {id:'household',label:'Household',icon:'🏠',color:'#00b894'},
  {id:'emotional',label:'Emotional',icon:'💛',color:'#ff9f43'},
  {id:'work',label:'Work / Career',icon:'💼',color:'#a29bfe'},
  {id:'health',label:'Health',icon:'🌿',color:'#00cec9'},
  {id:'personal',label:'Personal',icon:'🪞',color:'#ff5fa0'},
  {id:'relationship',label:'Relationship',icon:'🔗',color:'#fd79a8'},
  {id:'habits',label:'Habits',icon:'🔄',color:'#74b9ff'},
  {id:'other',label:'Other',icon:'✦',color:'#b2bec3'},
];
const URGS=[
  {id:'critical',emoji:'🔴',cls:'urgency-critical',selCls:'sel-critical',color:'#ff5252'},
  {id:'high',emoji:'🟠',cls:'urgency-high',selCls:'sel-high',color:'#ff9f43'},
  {id:'medium',emoji:'🟣',cls:'urgency-medium',selCls:'sel-medium',color:'#7c5cfc'},
  {id:'low',emoji:'🟢',cls:'urgency-low',selCls:'sel-low',color:'#00b894'},
];

// ── State ─────────────────────────────────────────────────────────────────────
let data=JSON.parse(localStorage.getItem('echo_data')||'[]');
let tasks=JSON.parse(localStorage.getItem('echo_tasks')||'[]');
let tab='feed', filterCat='all', searchQ='';
let editId=null, editTaskId=null, selCat=null, selUrg=null, notifOn=false;
let notifPerm=('Notification' in window)?Notification.permission:'denied';

// ── Helpers ───────────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(ts){return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtShort(ts){return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function getCat(id){return CATS.find(c=>c.id===id)||CATS[8];}
function getUrg(id){return URGS.find(u=>u.id===id)||URGS[2];}
function saveF(){localStorage.setItem('echo_data',JSON.stringify(data));}
function saveT(){localStorage.setItem('echo_tasks',JSON.stringify(tasks));}
function daysUntil(d){if(!d)return null;return Math.ceil((new Date(d+'T23:59:59')-new Date())/86400000);}

function dueBadge(t){
  if(!t.due)return '';
  const d=daysUntil(t.due);
  if(d<0)return `<span class="due-badge overdue">⚠ ${Math.abs(d)}d overdue</span>`;
  if(d===0)return `<span class="due-badge overdue">⚠ Due today</span>`;
  if(d<=3)return `<span class="due-badge soon">⏰ ${d}d left</span>`;
  return `<span class="due-badge">📅 ${fmtDate(new Date(t.due))}</span>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const area=$('scrollArea');
  if(tab==='feed')      renderFeed(area);
  else if(tab==='tasks')     renderTasks(area);
  else if(tab==='insights')  renderInsights(area);
  else                       renderSearch(area);
}

// ── Feed ──────────────────────────────────────────────────────────────────────
function renderFeed(el){
  let items=filterCat==='all'?[...data]:data.filter(d=>d.category===filterCat);
  items.sort((a,b)=>b.occurrences.at(-1).ts-a.occurrences.at(-1).ts);
  const now=new Date();
  const thisMonth=data.filter(d=>{const m=new Date(d.occurrences.at(-1).ts);return m.getMonth()===now.getMonth()&&m.getFullYear()===now.getFullYear();}).length;
  const recurring=data.filter(d=>d.occurrences.length>1).length;

  let h=`<div class="stats-bar">
    <div class="stat-pill"><div class="stat-num" style="color:var(--accent)">${data.length}</div><div class="stat-label">Total</div></div>
    <div class="stat-pill"><div class="stat-num" style="color:var(--accent2)">${recurring}</div><div class="stat-label">Recurring</div></div>
    <div class="stat-pill"><div class="stat-num" style="color:var(--accent3)">${thisMonth}</div><div class="stat-label">This month</div></div>
  </div><div class="filter-row"><button class="chip${filterCat==='all'?' active':''}" data-fc="all">All</button>`;
  [...new Set(data.map(d=>d.category))].forEach(c=>{
    const cat=getCat(c);
    h+=`<button class="chip${filterCat===c?' active':''}" data-fc="${c}">${cat.icon} ${cat.label}</button>`;
  });
  h+='</div>';

  if(!items.length){h+=`<div class="empty"><div class="empty-icon">🌱</div><div class="empty-text">Nothing yet!<br/>Tap + to log your first feedback.</div></div>`;}
  else items.forEach(item=>{
    const cat=getCat(item.category),n=item.occurrences.length;
    h+=`<div class="card" data-id="${item.id}">
      <div class="card-accent-bar" style="background:${cat.color}"></div>
      <div class="card-content">${esc(item.text)}</div>
      <div class="card-meta">
        <span class="badge badge-category" style="color:${cat.color};border-color:${cat.color}44;background:${cat.color}15">${cat.icon} ${cat.label}</span>
        ${n>1?`<span class="badge badge-count">×${n}</span>`:''}
        <span class="badge badge-date">${fmtDate(item.occurrences.at(-1).ts)}</span>
      </div>
      ${n>1?`<div class="card-footer"><span class="recurrence-dot"></span><span class="recurrence-label">Recurring · first ${fmtShort(item.occurrences[0].ts)}</span></div>`:''}
    </div>`;
  });

  el.innerHTML=h;
  el.querySelectorAll('[data-fc]').forEach(b=>b.addEventListener('click',()=>{filterCat=b.dataset.fc;render();}));
  el.querySelectorAll('.card[data-id]').forEach(c=>c.addEventListener('click',()=>openDetail(c.dataset.id)));
}

// ── Tasks ─────────────────────────────────────────────────────────────────────
function renderTasks(el){
  const UORD={critical:0,high:1,medium:2,low:3};
  const pending=[...tasks].filter(t=>!t.done).sort((a,b)=>(UORD[a.urgency]-UORD[b.urgency])||((a.due&&b.due)?new Date(a.due)-new Date(b.due):0));
  const done=tasks.filter(t=>t.done);
  const overdue=pending.filter(t=>t.due&&daysUntil(t.due)<0).length;

  let h='';
  if(notifPerm==='default'&&tasks.some(t=>t.notif)){
    h+=`<div class="notif-banner"><div class="notif-banner-text">🔔 Enable notifications to get reminders.</div><button class="notif-banner-btn" id="btnEnableNotif">Enable</button></div>`;
  }
  h+=`<div class="stats-bar">
    <div class="stat-pill"><div class="stat-num" style="color:var(--accent)">${pending.length}</div><div class="stat-label">Pending</div></div>
    <div class="stat-pill"><div class="stat-num" style="color:var(--red)">${overdue}</div><div class="stat-label">Overdue</div></div>
    <div class="stat-pill"><div class="stat-num" style="color:var(--green)">${done.length}</div><div class="stat-label">Done</div></div>
  </div>`;

  if(!tasks.length){h+=`<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">No tasks yet.<br/>Tap + to add a task.</div></div>`;}
  else{
    if(pending.length){h+=`<div class="section-header">Pending</div>`;pending.forEach(t=>{h+=taskCard(t);});}
    if(done.length){h+=`<div class="section-header" style="margin-top:20px">Completed</div>`;done.forEach(t=>{h+=taskCard(t);});}
  }

  el.innerHTML=h;
  const enb=$('btnEnableNotif');
  if(enb)enb.addEventListener('click',async()=>{await askNotif();render();});
  el.querySelectorAll('.task-card[data-tid]').forEach(c=>{
    c.addEventListener('click',e=>{if(!e.target.closest('.task-check'))openTaskDetail(c.dataset.tid);});
  });
  el.querySelectorAll('.task-check[data-tid]').forEach(b=>{
    b.addEventListener('click',e=>{
      e.stopPropagation();
      const t=tasks.find(t=>t.id===b.dataset.tid);
      if(t){t.done=!t.done;saveT();render();}
    });
  });
}

function taskCard(t){
  const u=getUrg(t.urgency);
  const lf=t.linkedFeedback?data.find(d=>d.id===t.linkedFeedback):null;
  return `<div class="task-card${t.done?' done':''}" data-tid="${t.id}">
    <div class="urgency-bar" style="background:${u.color}"></div>
    <div class="task-title">${esc(t.text)}</div>
    <div class="task-meta">
      <span class="urgency-badge ${u.cls}">${u.emoji} ${u.id}</span>
      ${dueBadge(t)}
      ${t.notif?`<span class="notif-dot" title="Reminder on"></span>`:''}
      ${lf?`<span class="linked-chip">🔗 ${esc(lf.text.slice(0,30))}${lf.text.length>30?'…':''}</span>`:''}
    </div>
    <div class="task-check${t.done?' checked':''}" data-tid="${t.id}">${t.done?'✓':''}</div>
  </div>`;
}

function openTaskDetail(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  const u=getUrg(t.urgency);
  const lf=t.linkedFeedback?data.find(d=>d.id===t.linkedFeedback):null;
  $('detailContent').innerHTML=`
    <div class="modal-handle"></div>
    <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:16px">
      <div style="flex:1">
        <span class="urgency-badge ${u.cls}" style="display:inline-block;margin-bottom:8px">${u.emoji} ${u.id}</span>
        <div style="font-size:1.05rem;font-weight:600;color:var(--text);line-height:1.4">${esc(t.text)}</div>
      </div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">
      ${t.due?`<div style="background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:8px 12px;font-family:var(--font-mono);font-size:.7rem;color:var(--text-dim)">📅 Due ${fmtDate(new Date(t.due))}</div>`:''}
      ${t.notif&&t.notifTime?`<div style="background:rgba(124,92,252,.08);border:2px solid rgba(124,92,252,.2);border-radius:10px;padding:8px 12px;font-family:var(--font-mono);font-size:.7rem;color:var(--accent2)">🔔 ${t.notifTime}</div>`:''}
    </div>
    ${lf?`<div style="background:rgba(124,92,252,.06);border:2px solid rgba(124,92,252,.15);border-radius:12px;padding:12px;margin-bottom:16px">
      <div style="font-family:var(--font-mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--accent2);margin-bottom:6px">🔗 Linked Feedback</div>
      <div style="font-size:.9rem;color:var(--text-dim);line-height:1.4">${esc(lf.text)}</div>
    </div>`:''}
    <button class="btn-primary" id="dtBtnToggle">${t.done?'Mark as pending':'Mark as done ✓'}</button>
    <button class="btn-primary" id="dtBtnEdit" style="background:white;color:var(--accent2);border:2px solid var(--accent2);box-shadow:none;margin-top:10px">Edit task</button>
    <button class="btn-secondary" id="dtBtnClose">Close</button>`;
  openModal('detailModal');
  $('dtBtnToggle').onclick=()=>{t.done=!t.done;saveT();closeModal('detailModal');render();};
  $('dtBtnEdit').onclick=()=>{closeModal('detailModal');openTaskEdit(id);};
  $('dtBtnClose').onclick=()=>closeModal('detailModal');
}

// ── Insights ──────────────────────────────────────────────────────────────────
function renderInsights(el){
  if(!data.length){el.innerHTML=`<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Add some feedback first.</div></div>`;return;}
  const cc={};data.forEach(d=>{cc[d.category]=(cc[d.category]||0)+d.occurrences.length;});
  const maxC=Math.max(...Object.values(cc));
  const now=new Date();
  const months=[];
  for(let i=5;i>=0;i--){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push({label:d.toLocaleDateString('en-US',{month:'short'}),count:0,key:`${d.getFullYear()}-${d.getMonth()}`});}
  data.forEach(item=>item.occurrences.forEach(o=>{const d=new Date(o.ts);const key=`${d.getFullYear()}-${d.getMonth()}`;const m=months.find(m=>m.key===key);if(m)m.count++;}));
  const maxM=Math.max(...months.map(m=>m.count),1);
  const recur=[...data].filter(d=>d.occurrences.length>1).sort((a,b)=>b.occurrences.length-a.occurrences.length).slice(0,5);
  const COLS=['#ff5fa0','#7c5cfc','#ff9f43','#00cec9','#fd79a8','#00b894'];

  let h=`<div class="insight-section"><div class="insight-title">💬 By Category</div>`;
  Object.entries(cc).sort((a,b)=>b[1]-a[1]).forEach(([cid,n])=>{
    const cat=getCat(cid);
    h+=`<div class="bar-row"><div class="bar-label">${cat.icon} ${cat.label}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxC*100)}%;background:linear-gradient(90deg,${cat.color}88,${cat.color})"></div></div><div class="bar-count">${n}</div></div>`;
  });
  h+=`</div><div class="insight-section"><div class="insight-title">📅 Monthly Activity</div><div style="display:flex;gap:6px;align-items:flex-end;height:70px">`;
  months.forEach((m,i)=>{
    const ht=m.count?Math.max(10,Math.round(m.count/maxM*54)):4;
    const col=m.count?`linear-gradient(180deg,${COLS[i%COLS.length]},${COLS[(i+3)%COLS.length]})`:'var(--border)';
    h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:100%;height:${ht}px;background:${col};border-radius:5px 5px 0 0"></div><div style="font-family:var(--font-mono);font-size:.55rem;color:var(--text-dimmer)">${m.label}</div></div>`;
  });
  h+=`</div></div>`;
  if(tasks.length){
    const uc={};tasks.forEach(t=>{uc[t.urgency]=(uc[t.urgency]||0)+1;});
    h+=`<div class="insight-section"><div class="insight-title">✅ Task Urgency</div>`;
    URGS.forEach(u=>{if(!uc[u.id])return;h+=`<div class="bar-row"><div class="bar-label">${u.emoji} ${u.id}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(uc[u.id]/tasks.length*100)}%;background:${u.color}"></div></div><div class="bar-count">${uc[u.id]}</div></div>`;});
    h+=`</div>`;
  }
  if(recur.length){
    h+=`<div class="insight-section"><div class="insight-title">🔄 Most Recurring</div>`;
    recur.forEach(item=>{
      const cat=getCat(item.category);
      h+=`<div class="card" data-id="${item.id}"><div class="card-accent-bar" style="background:${cat.color}"></div><div class="card-content">${esc(item.text.slice(0,80))}${item.text.length>80?'…':''}</div><div class="card-meta" style="margin-top:6px"><span class="badge badge-count">×${item.occurrences.length}</span><span class="badge badge-date">${fmtDate(item.occurrences[0].ts)} → ${fmtDate(item.occurrences.at(-1).ts)}</span></div></div>`;
    });
    h+=`</div>`;
  }
  el.innerHTML=h;
  el.querySelectorAll('.card[data-id]').forEach(c=>c.addEventListener('click',()=>openDetail(c.dataset.id)));
}

// ── Search ─────────────────────────────────────────────────────────────────────
function renderSearch(el){
  let h=`<div class="search-box"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="Search feedback…" value="${esc(searchQ)}"/></div>`;
  const q=searchQ.toLowerCase().trim();
  const res=q?data.filter(d=>d.text.toLowerCase().includes(q)||(d.occurrences.some(o=>o.note&&o.note.toLowerCase().includes(q)))||getCat(d.category).label.toLowerCase().includes(q)):[...data];
  res.sort((a,b)=>b.occurrences.at(-1).ts-a.occurrences.at(-1).ts);
  if(!res.length)h+=`<div class="empty"><div class="empty-icon">🔎</div><div class="empty-text">${q?'No results found.':'Start typing to search.'}</div></div>`;
  else res.forEach(item=>{
    const cat=getCat(item.category),n=item.occurrences.length;
    h+=`<div class="card" data-id="${item.id}"><div class="card-accent-bar" style="background:${cat.color}"></div><div class="card-content">${esc(item.text)}</div><div class="card-meta" style="margin-top:8px"><span class="badge badge-category" style="color:${cat.color};border-color:${cat.color}44;background:${cat.color}15">${cat.icon} ${cat.label}</span>${n>1?`<span class="badge badge-count">×${n}</span>`:''}</div></div>`;
  });
  el.innerHTML=h;
  const si=$('searchInput');
  if(si){si.addEventListener('input',e=>{searchQ=e.target.value;renderSearch(el);});si.focus();}
  el.querySelectorAll('.card[data-id]').forEach(c=>c.addEventListener('click',()=>openDetail(c.dataset.id)));
}

// ── Detail modal ──────────────────────────────────────────────────────────────
function openDetail(id){
  const item=data.find(d=>d.id===id);if(!item)return;
  const cat=getCat(item.category);
  let occ=[...item.occurrences].reverse().map(o=>`<div class="occ-item"><span class="occ-date">${fmtDate(o.ts)}</span><span class="occ-note">${esc(o.note||'—')}</span></div>`).join('');
  let tl=item.occurrences.map((o,i)=>`<div class="tl-dot" style="color:${cat.color}"></div>${i<item.occurrences.length-1?'<div class="tl-line"></div>':''}`).join('');
  const relT=tasks.filter(t=>t.linkedFeedback===id);
  $('detailContent').innerHTML=`
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;gap:10px">
      <div>
        <div style="font-family:var(--font-mono);font-size:.6rem;text-transform:uppercase;letter-spacing:.1em;color:${cat.color};margin-bottom:6px">${cat.icon} ${cat.label}</div>
        <div style="font-size:1.05rem;font-weight:500;line-height:1.4;color:var(--text);max-width:270px">${esc(item.text)}</div>
      </div>
      <div style="text-align:center;background:rgba(255,95,160,.1);border:2px solid rgba(255,95,160,.2);border-radius:12px;padding:10px 16px;flex-shrink:0">
        <div style="font-size:2rem;font-weight:700;color:var(--accent);line-height:1">${item.occurrences.length}</div>
        <div style="font-family:var(--font-mono);font-size:.55rem;color:var(--text-dimmer);text-transform:uppercase">times</div>
      </div>
    </div>
    ${item.occurrences.length>1?`<div style="margin-bottom:16px"><div class="timeline-label">Timeline</div><div class="timeline-track">${tl}</div><div style="font-family:var(--font-mono);font-size:.58rem;color:var(--text-dimmer);margin-top:6px">First: ${fmtDate(item.occurrences[0].ts)} · Last: ${fmtDate(item.occurrences.at(-1).ts)}</div></div>`:''}
    <div style="font-family:var(--font-mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dimmer);margin-bottom:8px">All occurrences</div>
    <div>${occ}</div>
    ${relT.length?`<div style="margin-top:12px;font-family:var(--font-mono);font-size:.6rem;text-transform:uppercase;color:var(--accent2)">✅ ${relT.length} linked task${relT.length>1?'s':''}</div>`:''}
    <button class="btn-primary" id="dtLogAgain" style="margin-top:20px">Log it happened again</button>
    <button class="btn-primary" id="dtEdit" style="background:white;color:var(--accent2);border:2px solid var(--accent2);box-shadow:none;margin-top:10px">Edit feedback</button>
    <button class="btn-secondary" id="dtClose">Close</button>`;
  openModal('detailModal');
  $('dtLogAgain').onclick=()=>{
    const note=prompt('Any context? (optional)','');
    item.occurrences.push({ts:Date.now(),note:note||''});
    saveF();closeModal('detailModal');render();
  };
  $('dtEdit').onclick=()=>{closeModal('detailModal');openFeedbackEdit(id);};
  $('dtClose').onclick=()=>closeModal('detailModal');
}

// ── Modal helpers ─────────────────────────────────────────────────────────────
function openModal(id){
  const el=$(id);
  el.classList.add('open');
  // Close when tapping the dark backdrop (not the modal sheet itself)
  el.addEventListener('click',function handler(e){
    if(e.target===el){closeModal(id);el.removeEventListener('click',handler);}
  });
}
function closeModal(id){$(id).classList.remove('open');}

// ── Feedback modal ────────────────────────────────────────────────────────────
function openFeedbackAdd(){
  editId=null;selCat=null;
  $('feedbackText').value='';
  $('contextNote').value='';
  $('modalTitle').textContent='New Feedback';
  $('btnDelete').style.display='none';
  buildCatGrid();
  openModal('addModal');
  setTimeout(()=>$('feedbackText').focus(),350);
}

function openFeedbackEdit(id){
  const item=data.find(d=>d.id===id);if(!item)return;
  editId=id;selCat=item.category;
  $('feedbackText').value=item.text;
  $('contextNote').value=item.occurrences[0]?.note||'';
  $('modalTitle').textContent='Edit Feedback';
  $('btnDelete').style.display='block';
  buildCatGrid();
  openModal('addModal');
}

function buildCatGrid(){
  $('categoryGrid').innerHTML=CATS.map(c=>`<div class="cat-btn${selCat===c.id?' selected':''}" data-cat="${c.id}"><span class="cat-icon">${c.icon}</span>${c.label}</div>`).join('');
  $('categoryGrid').querySelectorAll('.cat-btn').forEach(b=>b.addEventListener('click',()=>{
    selCat=b.dataset.cat;
    $('categoryGrid').querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('selected'));
    b.classList.add('selected');
  }));
}

$('btnSave').addEventListener('click',()=>{
  const text=$('feedbackText').value.trim();
  const note=$('contextNote').value.trim();
  if(!text){$('feedbackText').focus();return;}
  if(!selCat){alert('Please pick a category.');return;}
  if(editId){
    const item=data.find(d=>d.id===editId);
    item.text=text;item.category=selCat;
    if(item.occurrences[0])item.occurrences[0].note=note;
  }else{
    data.push({id:uid(),text,category:selCat,occurrences:[{ts:Date.now(),note}]});
  }
  saveF();closeModal('addModal');render();
});

$('btnDelete').addEventListener('click',()=>{
  if(confirm('Delete this feedback?')){data=data.filter(d=>d.id!==editId);saveF();closeModal('addModal');render();}
});
$('btnCancel').addEventListener('click',()=>closeModal('addModal'));

// ── Task modal ────────────────────────────────────────────────────────────────
function openTaskAdd(){
  editTaskId=null;selUrg=null;notifOn=false;
  $('taskText').value='';$('taskDue').value='';$('notifTime').value='09:00';
  $('taskModalTitle').textContent='New Task';
  $('btnTaskDelete').style.display='none';
  $('notifToggle').classList.remove('on');
  $('notifTimeRow').style.display='none';
  buildUrgGrid();populateLinked(null);
  openModal('taskModal');
  setTimeout(()=>$('taskText').focus(),350);
}

function openTaskEdit(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  editTaskId=id;selUrg=t.urgency;notifOn=t.notif||false;
  $('taskText').value=t.text;$('taskDue').value=t.due||'';$('notifTime').value=t.notifTime||'09:00';
  $('taskModalTitle').textContent='Edit Task';
  $('btnTaskDelete').style.display='block';
  $('notifToggle').classList.toggle('on',notifOn);
  $('notifTimeRow').style.display=notifOn?'block':'none';
  buildUrgGrid();populateLinked(t.linkedFeedback||null);
  openModal('taskModal');
}

function buildUrgGrid(){
  $('urgencyGrid').innerHTML=URGS.map(u=>`<div class="urg-btn${selUrg===u.id?' '+u.selCls:''}" data-urg="${u.id}"><span style="font-size:1.3rem">${u.emoji}</span>${u.id}</div>`).join('');
  $('urgencyGrid').querySelectorAll('.urg-btn').forEach(b=>b.addEventListener('click',()=>{
    selUrg=b.dataset.urg;
    $('urgencyGrid').querySelectorAll('.urg-btn').forEach(x=>{x.className='urg-btn';});
    b.classList.add(URGS.find(u=>u.id===selUrg).selCls);
  }));
}

function populateLinked(selectedId){
  const sel=$('taskLinkedFeedback');
  sel.innerHTML='<option value="">— none —</option>';
  data.forEach(d=>{
    const o=document.createElement('option');
    o.value=d.id;o.textContent=d.text.slice(0,60)+(d.text.length>60?'…':'');
    if(d.id===selectedId)o.selected=true;
    sel.appendChild(o);
  });
}

$('notifToggle').addEventListener('click',async()=>{
  if(!notifOn&&notifPerm!=='granted'){
    const ok=await askNotif();
    if(!ok){alert('Enable notifications in your browser/phone settings.');return;}
  }
  notifOn=!notifOn;
  $('notifToggle').classList.toggle('on',notifOn);
  $('notifTimeRow').style.display=notifOn?'block':'none';
});

$('btnTaskSave').addEventListener('click',()=>{
  const text=$('taskText').value.trim();
  if(!text){$('taskText').focus();return;}
  if(!selUrg){alert('Please pick an urgency level.');return;}
  const due=$('taskDue').value;
  const notifTime=$('notifTime').value;
  const linkedFeedback=$('taskLinkedFeedback').value||null;
  if(editTaskId){
    const t=tasks.find(t=>t.id===editTaskId);
    Object.assign(t,{text,urgency:selUrg,due,notif:notifOn,notifTime,linkedFeedback});
    if(notifOn)scheduleNotif(t);
  }else{
    const t={id:uid(),text,urgency:selUrg,due,notif:notifOn,notifTime,linkedFeedback,done:false,createdAt:Date.now()};
    tasks.push(t);if(notifOn)scheduleNotif(t);
  }
  saveT();closeModal('taskModal');render();
});

$('btnTaskDelete').addEventListener('click',()=>{
  if(confirm('Delete this task?')){tasks=tasks.filter(t=>t.id!==editTaskId);saveT();closeModal('taskModal');render();}
});
$('btnTaskCancel').addEventListener('click',()=>closeModal('taskModal'));

// ── Notifications ─────────────────────────────────────────────────────────────
async function askNotif(){
  if(!('Notification' in window))return false;
  const p=await Notification.requestPermission();
  notifPerm=p;return p==='granted';
}
function scheduleNotif(t){
  if(!t.notif||!t.notifTime||!t.due||notifPerm!=='granted')return;
  const fireAt=new Date(t.due+'T'+t.notifTime+':00');
  const delay=fireAt-new Date();
  if(delay>0&&delay<86400000*7){
    setTimeout(()=>{try{new Notification('Echo reminder 🌀',{body:t.text,tag:'echo-'+t.id});}catch(e){}},delay);
  }
}
function scheduleAll(){tasks.filter(t=>!t.done&&t.notif).forEach(scheduleNotif);}

// ── Tabs ──────────────────────────────────────────────────────────────────────
$('tabs').querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>{
  $('tabs').querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  b.classList.add('active');tab=b.dataset.tab;render();
}));

// ── + button ──────────────────────────────────────────────────────────────────
$('btnAdd').addEventListener('click',()=>{
  if(tab==='tasks')openTaskAdd();else openFeedbackAdd();
});

// ── Boot ──────────────────────────────────────────────────────────────────────
scheduleAll();
render();
</script>
</body>
</html>
